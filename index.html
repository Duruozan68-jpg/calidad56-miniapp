<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calidad — Mini App</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0c0a;
        --bg-2: #12110e;
        --panel: #1b1a17;
        --panel-2: #23211d;
        --gold: #d9c17a;
        --gold-2: #b29046;
        --gold-3: #7d5b25;
        --text: #f5f3ee;
        --text-dim: #c7c3ba;
        --muted: #8f8b81;
        --accent: #3da6ff;
        --success: #4bc17b;
        --danger: #ff5b5b;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.6);
        --radius-xl: 30px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --ring: 0 0 0 1px rgba(217, 193, 122, 0.38) inset;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Playfair Display", "Georgia", serif;
        background:
          radial-gradient(70% 60% at 50% 0%, rgba(217, 193, 122, 0.15), transparent 60%),
          radial-gradient(30% 30% at 10% 5%, rgba(255, 255, 255, 0.08), transparent 60%),
          radial-gradient(30% 30% at 90% 5%, rgba(255, 255, 255, 0.08), transparent 60%),
          linear-gradient(180deg, #0e0d0b, #0b0b09 50%, #0e0d0b 100%);
        color: var(--text);
        min-height: 100vh;
      }

      .app {
        max-width: 920px;
        margin: 0 auto;
        padding: 16px 16px 120px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
      }

      .brand {
        text-align: center;
      }

      .brand h1 {
        margin: 4px 0 0;
        font-size: clamp(28px, 7vw, 46px);
        letter-spacing: 2px;
        color: var(--gold);
        text-shadow: 0 10px 24px rgba(217, 193, 122, 0.35);
      }

      .icon-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(18, 18, 14, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: transform 0.15s ease, border 0.2s ease;
      }

      .icon-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(217, 193, 122, 0.6);
      }

      .categories {
        margin-top: 10px;
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 12px;
      }

      .cat-toggle {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        border: 1px solid rgba(217, 193, 122, 0.4);
        background: var(--panel);
        color: var(--gold);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .cat-scroll {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 6px;
      }

      .pill {
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(217, 193, 122, 0.4);
        background: rgba(20, 19, 16, 0.9);
        color: var(--text);
        white-space: nowrap;
        font-size: 14px;
        cursor: pointer;
      }

      .pill.active {
        background: var(--gold);
        color: #1a1406;
      }

      .section-title {
        margin: 18px 0 12px;
        font-size: 24px;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .product-card {
        background: var(--panel);
        border-radius: var(--radius-lg);
        border: 1px solid rgba(217, 193, 122, 0.35);
        overflow: hidden;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform 0.2s ease, border 0.2s ease;
      }

      .product-card:hover {
        transform: translateY(-3px);
        border-color: rgba(217, 193, 122, 0.7);
      }

      .product-media {
        height: 140px;
        background: linear-gradient(130deg, rgba(89, 60, 255, 0.6), rgba(25, 12, 40, 0.95));
        display: grid;
        place-items: center;
        position: relative;
      }

      .product-media[data-tone="teal"] {
        background: linear-gradient(130deg, rgba(28, 230, 190, 0.55), rgba(10, 55, 50, 0.95));
      }

      .product-media[data-tone="gold"] {
        background: linear-gradient(130deg, rgba(255, 196, 90, 0.6), rgba(55, 30, 8, 0.95));
      }

      .product-media span {
        background: rgba(0, 0, 0, 0.55);
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 12px;
      }

      .product-body {
        padding: 12px 14px 16px;
      }

      .product-title {
        font-size: 18px;
        margin: 6px 0 6px;
      }

      .product-meta {
        color: var(--text-dim);
        font-size: 13px;
        font-family: "Georgia", serif;
      }

      .view {
        display: none;
        animation: fade 0.3s ease;
      }

      .view.active {
        display: block;
      }

      .cart-header {
        font-size: 28px;
        margin: 16px 0 8px;
      }

      .cart-item {
        padding: 16px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(217, 193, 122, 0.4);
        background: var(--panel);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }

      .cart-item h3 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .cart-item p {
        margin: 0;
        color: var(--text-dim);
      }

      .qty {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #202420;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .qty button {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        color: #fff;
        font-size: 16px;
      }

      .qty .minus {
        background: #d83030;
      }

      .qty .plus {
        background: #e6c67a;
        color: #1a1508;
      }

      .totals {
        margin-top: 12px;
        display: grid;
        gap: 10px;
        font-size: 18px;
      }

      .totals strong {
        font-size: 24px;
      }

      .pickup {
        margin-top: 18px;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        border-radius: 999px;
        border: 1px solid rgba(217, 193, 122, 0.45);
        overflow: hidden;
        background: #171611;
        margin-top: 10px;
      }

      .segmented button {
        padding: 12px 10px;
        border: none;
        background: transparent;
        color: var(--text);
        font-size: 16px;
        cursor: pointer;
      }

      .segmented button.active {
        background: #3f97df;
        color: #0b0b0b;
        font-weight: 700;
      }

      .form-card {
        margin-top: 14px;
        padding: 14px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(217, 193, 122, 0.35);
        background: var(--panel-2);
      }

      .input {
        width: 100%;
        border-radius: 999px;
        border: 1px solid rgba(217, 193, 122, 0.5);
        background: #14130f;
        color: var(--text);
        padding: 12px 16px;
        font-size: 14px;
      }

      .radio-group {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin: 12px 0 8px;
        font-family: "Georgia", serif;
      }

      .primary-btn {
        width: 100%;
        margin-top: 12px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #6a5a3a;
        color: #14120c;
        border: none;
        font-size: 15px;
        cursor: pointer;
      }

      .primary-btn.active {
        background: var(--accent);
        color: #ffffff;
      }

      .account-section {
        margin-top: 12px;
      }

      .history-card {
        border: 1px solid rgba(217, 193, 122, 0.35);
        background: var(--panel);
        border-radius: var(--radius-lg);
        padding: 14px;
        margin-bottom: 12px;
      }

      .admin-panel {
        margin-top: 16px;
        border-radius: var(--radius-lg);
        border: 1px dashed rgba(217, 193, 122, 0.5);
        padding: 14px;
        display: none;
      }

      .admin-panel.active {
        display: block;
      }

      .admin-grid {
        display: grid;
        gap: 10px;
      }

      .admin-grid input,
      .admin-grid select {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(217, 193, 122, 0.4);
        background: #14130f;
        color: var(--text);
      }

      .admin-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(217, 193, 122, 0.4);
        background: rgba(20, 19, 16, 0.9);
        color: var(--text);
        font-size: 13px;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(12, 12, 10, 0.98);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        padding: 10px 12px 14px;
        backdrop-filter: blur(12px);
      }

      .nav-item {
        display: grid;
        place-items: center;
        color: var(--gold-2);
        font-size: 14px;
        gap: 6px;
        cursor: pointer;
      }

      .nav-item svg {
        width: 22px;
        height: 22px;
      }

      .nav-item.active {
        color: var(--gold);
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        place-items: center;
        padding: 16px;
        z-index: 10;
      }

      .modal.active {
        display: grid;
      }

      .modal-card {
        width: min(520px, 92vw);
        background: var(--panel-2);
        border-radius: var(--radius-xl);
        border: 1px solid rgba(217, 193, 122, 0.45);
        padding: 18px;
        box-shadow: var(--shadow);
      }

      .modal-card h3 {
        margin: 0 0 6px;
        font-size: 22px;
      }

      .modal-card p {
        color: var(--text-dim);
        font-family: "Georgia", serif;
      }

      .modal-footer {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      .ghost-btn {
        border: 1px solid rgba(217, 193, 122, 0.4);
        background: transparent;
        color: var(--text);
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
      }

      .solid-btn {
        border: none;
        background: var(--gold);
        color: #1a1406;
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
        flex: 1;
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 520px) {
        .product-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <button class="icon-btn" aria-label="Fermer">✕</button>
        <div class="brand">
          <h1>Calidad</h1>
        </div>
        <button class="icon-btn" aria-label="Plus">•••</button>
      </header>

      <section class="categories">
        <button class="cat-toggle" title="Catégories">≡</button>
        <div class="cat-scroll" id="categoryPills"></div>
      </section>

      <main>
        <section id="menuView" class="view active">
          <div class="section-title">Produits disponibles</div>
          <div class="product-grid" id="productGrid"></div>
        </section>

        <section id="cartView" class="view">
          <div class="cart-header">Mon panier</div>
          <div id="cartItems"></div>
          <div class="totals">
            <div>Total Articles: <strong id="totalItems">0</strong></div>
            <div>Total à payer: <strong id="totalPrice">0.00 €</strong></div>
          </div>

          <div class="pickup">
            <div>Type de retrait de la commande</div>
            <div class="segmented" id="pickupTabs">
              <button class="active" data-type="meetup">Meetup</button>
              <button data-type="delivery">Livraison</button>
            </div>

            <div class="form-card" id="pickupForm">
              <div id="deliveryFields" style="display: none;">
                <input
                  class="input"
                  id="addressInput"
                  placeholder="Entrez votre adresse de livraison complète"
                />
                <div class="radio-group">
                  <label><input type="radio" name="housing" value="Maison" /> Maison</label>
                  <label><input type="radio" name="housing" value="Appartement" /> Appartement</label>
                  <label><input type="radio" name="housing" value="Hotel" /> Hotel</label>
                </div>
              </div>
              <button class="primary-btn active" id="primaryAction" type="button">
                Contacter le secrétaire (Meetup)
              </button>
            </div>
          </div>
        </section>

        <section id="accountView" class="view">
          <div class="section-title">Mon compte</div>
          <div class="account-section">
            <div class="history-card">
              <div>Historique des commandes</div>
              <div class="chip" id="orderCount">0 commande</div>
              <div id="orderHistory" style="margin-top: 10px; color: var(--text-dim);">
                Aucune commande enregistrée.
              </div>
            </div>

            <div class="history-card">
              <div>Accès Admin</div>
              <input
                class="input"
                id="adminCode"
                type="password"
                placeholder="Entrez le code admin"
              />
              <button class="primary-btn" id="adminUnlock">Déverrouiller</button>
              <div class="admin-panel" id="adminPanel">
                <div style="margin-bottom: 8px;">Gérer les produits</div>
                <div class="admin-grid">
                  <input id="pName" placeholder="Nom du produit" />
                  <input id="pPrice" placeholder="Prix (ex: 350.00)" />
                  <input id="pCategory" placeholder="Catégorie" />
                  <select id="pTone">
                    <option value="violet">Violet</option>
                    <option value="teal">Teal</option>
                    <option value="gold">Gold</option>
                  </select>
                  <textarea id="pDesc" placeholder="Description" rows="3" style="border-radius: 12px; padding: 10px; background: #14130f; color: var(--text); border: 1px solid rgba(217,193,122,0.4);"></textarea>
                </div>
                <div class="admin-actions">
                  <button class="primary-btn" id="addProduct">Ajouter</button>
                  <button class="ghost-btn" id="clearProducts">Supprimer tous</button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item active" data-target="menuView">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 10l8-6 8 6v8a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1v-8z" stroke="currentColor" stroke-width="1.6" />
        </svg>
        Menu
      </div>
      <div class="nav-item" data-target="cartView">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6 6h14l-2 9H8L6 6z" stroke="currentColor" stroke-width="1.6" />
          <circle cx="9" cy="19" r="1.5" stroke="currentColor" stroke-width="1.6" />
          <circle cx="17" cy="19" r="1.5" stroke="currentColor" stroke-width="1.6" />
        </svg>
        Panier
      </div>
      <div class="nav-item" data-target="accountView">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="3" stroke="currentColor" stroke-width="1.6" />
          <path d="M4 20c2-4 14-4 16 0" stroke="currentColor" stroke-width="1.6" />
        </svg>
        Compte
      </div>
    </nav>

    <div class="modal" id="productModal">
      <div class="modal-card">
        <h3 id="modalTitle">Produit</h3>
        <p id="modalDesc"></p>
        <div class="modal-footer">
          <button class="ghost-btn" id="closeModal">Fermer</button>
          <button class="solid-btn" id="addToCart">Ajouter au panier</button>
        </div>
      </div>
    </div>

    <script>
      const adminSecret = "2810";
      const secretaryLink = "https://t.me/Calidad_Secretaire";

      const defaultProducts = [
        { id: 1, name: "Lemon cherry gelato", price: 350, category: "Premium", tone: "gold", desc: "Arômes sucrés, texture crémeuse, finition propre et intense." },
        { id: 2, name: "Brides maid", price: 300, category: "Cali", tone: "violet", desc: "Parfum floral, notes fruitées, sélection top shelf." },
        { id: 3, name: "Autum", price: 320, category: "Cali", tone: "violet", desc: "Équilibre parfait entre douceur et puissance." },
        { id: 4, name: "Ocean mint", price: 280, category: "Fresh", tone: "teal", desc: "Fraîcheur mentholée et finale douce." }
      ];

      const storageKey = "calidad_products";
      const orderKey = "calidad_orders";
      const cartKey = "calidad_cart";

      const productGrid = document.getElementById("productGrid");
      const categoryPills = document.getElementById("categoryPills");
      const cartItems = document.getElementById("cartItems");
      const totalItems = document.getElementById("totalItems");
      const totalPrice = document.getElementById("totalPrice");
      const modal = document.getElementById("productModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalDesc = document.getElementById("modalDesc");
      const addToCartBtn = document.getElementById("addToCart");

      let products = JSON.parse(localStorage.getItem(storageKey)) || defaultProducts;
      let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
      let selectedProduct = null;
      let selectedCategory = "Toutes";

      const toneMap = { violet: "", teal: "teal", gold: "gold" };

      function saveProducts() {
        localStorage.setItem(storageKey, JSON.stringify(products));
      }

      function saveCart() {
        localStorage.setItem(cartKey, JSON.stringify(cart));
      }

      function renderCategories() {
        const cats = ["Toutes", ...new Set(products.map((p) => p.category))];
        categoryPills.innerHTML = "";
        cats.forEach((cat) => {
          const pill = document.createElement("button");
          pill.className = "pill" + (cat === selectedCategory ? " active" : "");
          pill.textContent = cat;
          pill.addEventListener("click", () => {
            selectedCategory = cat;
            renderCategories();
            renderProducts();
          });
          categoryPills.appendChild(pill);
        });
      }

      function renderProducts() {
        productGrid.innerHTML = "";
        const list = selectedCategory === "Toutes" ? products : products.filter((p) => p.category === selectedCategory);
        list.forEach((item) => {
          const card = document.createElement("article");
          card.className = "product-card";
          card.innerHTML = `
            <div class="product-media" data-tone="${toneMap[item.tone] || ""}">
              <span>${item.category}</span>
            </div>
            <div class="product-body">
              <div class="product-title">${item.name}</div>
              <div class="product-meta">${item.price.toFixed(2)} €</div>
            </div>
          `;
          card.addEventListener("click", () => openProduct(item));
          productGrid.appendChild(card);
        });
      }

      function openProduct(item) {
        selectedProduct = item;
        modalTitle.textContent = item.name;
        modalDesc.textContent = item.desc;
        modal.classList.add("active");
      }

      function addToCart(item) {
        const existing = cart.find((c) => c.id === item.id);
        if (existing) existing.qty += 1;
        else cart.push({ ...item, qty: 1 });
        saveCart();
        renderCart();
        modal.classList.remove("active");
      }

      function renderCart() {
        cartItems.innerHTML = "";
        let totalQty = 0;
        let total = 0;
        cart.forEach((item) => {
          totalQty += item.qty;
          total += item.price * item.qty;
          const row = document.createElement("div");
          row.className = "cart-item";
          row.innerHTML = `
            <div>
              <h3>${item.name}</h3>
              <p>${item.qty} x ${item.price.toFixed(2)} €</p>
            </div>
            <div class="qty">
              <button class="minus">−</button>
              <strong>${item.qty}</strong>
              <button class="plus">+</button>
            </div>
          `;
          row.querySelector(".minus").addEventListener("click", () => changeQty(item.id, -1));
          row.querySelector(".plus").addEventListener("click", () => changeQty(item.id, 1));
          cartItems.appendChild(row);
        });
        totalItems.textContent = totalQty;
        totalPrice.textContent = total.toFixed(2) + " €";
      }

      function changeQty(id, delta) {
        cart = cart.map((item) => item.id === id ? { ...item, qty: Math.max(0, item.qty + delta) } : item).filter((item) => item.qty > 0);
        saveCart();
        renderCart();
      }

      addToCartBtn.addEventListener("click", () => { if (selectedProduct) addToCart(selectedProduct); });
      document.getElementById("closeModal").addEventListener("click", () => modal.classList.remove("active"));
      modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.remove("active"); });

      const navItems = document.querySelectorAll(".nav-item");
      const views = document.querySelectorAll(".view");
      navItems.forEach((item) => {
        item.addEventListener("click", () => {
          navItems.forEach((n) => n.classList.remove("active"));
          item.classList.add("active");
          views.forEach((v) => v.classList.remove("active"));
          document.getElementById(item.dataset.target).classList.add("active");
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });

      const tabs = document.querySelectorAll("#pickupTabs button");
      const deliveryFields = document.getElementById("deliveryFields");
      const primaryAction = document.getElementById("primaryAction");
      const addressInput = document.getElementById("addressInput");
      const radios = document.querySelectorAll('input[name="housing"]');

      function buildMessage(type) {
        const items = cart.map((i) => `${i.name} x${i.qty}`).join(", ");
        if (type === "meetup") return `Bonjour, je veux commander: ${items}. Retrait: Meetup.`;
        const housing = [...radios].find((r) => r.checked)?.value || "";
        return `Bonjour, je veux commander: ${items}. Retrait: Livraison. Adresse: ${addressInput.value}. Logement: ${housing}.`;
      }

      function updateContactLink(type) {
        const msg = encodeURIComponent(buildMessage(type));
        primaryAction.onclick = () => {
          window.open(`${secretaryLink}?text=${msg}`, "_blank");
          saveOrder(buildMessage(type));
        };
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((btn) => btn.classList.remove("active"));
          tab.classList.add("active");
          const type = tab.dataset.type;
          if (type === "meetup") {
            deliveryFields.style.display = "none";
            primaryAction.textContent = "Contacter le secrétaire (Meetup)";
            updateContactLink("meetup");
          } else {
            deliveryFields.style.display = "block";
            primaryAction.textContent = "Envoyer la commande (Livraison)";
            updateContactLink("delivery");
          }
          primaryAction.classList.add("active");
        });
      });

      function saveOrder(message) {
        const orders = JSON.parse(localStorage.getItem(orderKey)) || [];
        orders.push({ date: new Date().toLocaleString("fr-FR"), message });
        localStorage.setItem(orderKey, JSON.stringify(orders));
        renderOrders();
      }

      function renderOrders() {
        const orders = JSON.parse(localStorage.getItem(orderKey)) || [];
        const orderHistory = document.getElementById("orderHistory");
        const orderCount = document.getElementById("orderCount");
        orderCount.textContent = orders.length + " commande";
        if (!orders.length) {
          orderHistory.textContent = "Aucune commande enregistrée.";
          return;
        }
        orderHistory.innerHTML = orders.slice(-5).reverse().map((o) => `<div style="margin-bottom:6px;">${o.date} — ${o.message}</div>`).join("");
      }

      document.getElementById("adminUnlock").addEventListener("click", () => {
        const code = document.getElementById("adminCode").value.trim();
        const panel = document.getElementById("adminPanel");
        if (code === adminSecret) panel.classList.add("active");
        else { panel.classList.remove("active"); alert("Code invalide."); }
      });

      document.getElementById("addProduct").addEventListener("click", () => {
        const name = document.getElementById("pName").value.trim();
        const price = parseFloat(document.getElementById("pPrice").value);
        const category = document.getElementById("pCategory").value.trim();
        const tone = document.getElementById("pTone").value;
        const desc = document.getElementById("pDesc").value.trim();
        if (!name || !price || !category) return;
        products.push({ id: Date.now(), name, price, category, tone, desc });
        saveProducts();
        renderCategories();
        renderProducts();
      });

      document.getElementById("clearProducts").addEventListener("click", () => {
        products = [];
        saveProducts();
        renderCategories();
        renderProducts();
      });

      renderCategories();
      renderProducts();
      renderCart();
      renderOrders();
      updateContactLink("meetup");
    </script>
  </body>
</html>
