<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calidad56 Mini‑App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <h2>🚗 Calidad56</h2>
  <p>Mini‑app Telegram OK ✅</p>
  <button onclick="send()">Envoyer</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    function send() {
      tg.sendData("Mini‑app fonctionne");
      tg.close();
    }
  </script>
</body>
</html>
