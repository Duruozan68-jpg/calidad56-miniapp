<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calidad West</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: url("./assets/background.png") center / cover no-repeat fixed;
  color: white;
}

.overlay {
  min-height: 100vh;
  background: linear-gradient(
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.85)
  );
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 32px;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  opacity: 0.8;
  margin-bottom: 25px;
}

.category {
  backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 18px;
  border: 1px solid rgba(255,255,255,0.15);
}

.category h2 {
  margin: 0 0 12px;
  font-size: 20px;
  color: #2ecc71;
}

.product {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.product p {
  margin: 0;
  font-weight: bold;
}

button {
  background: linear-gradient(135deg,#2ecc71,#27ae60);
  border: none;
  padding: 10px 16px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 18px rgba(46,204,113,0.4);
}

/* POPUP */
#details {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  padding: 20px;
}

#details .box {
  max-width: 420px;
  margin: auto;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  border-radius: 20px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.2);
}

#details h2 {
  margin-top: 0;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  border: none;
}

.close {
  background: #e74c3c;
  margin-top: 12px;
}
</style>
</head>

<body>
<div class="overlay">
  <h1>🌿 Calidad West</h1>
  <div class="subtitle">Premium selection • Cali quality</div>

  <!-- Mousseux -->
  <div class="category">
    <h2>💨 Mousseux</h2>
    <div class="product">
      <p>Ice Hash</p>
      <button onclick="openDetails('Ice Hash','Mousseux ultra pur, texture crémeuse, goût intense.')">Voir</button>
    </div>
  </div>

  <!-- Filtrer -->
  <div class="category">
    <h2>🧪 Filtrer</h2>
    <div class="product">
      <p>Dry Sift Premium</p>
      <button onclick="openDetails('Dry Sift Premium','Filtration fine, haute concentration, très aromatique.')">Voir</button>
    </div>
  </div>

  <!-- Frozen -->
  <div class="category">
    <h2>❄️ Frozen</h2>
    <div class="product">
      <p>Frozen Kush</p>
      <button onclick="openDetails('Frozen Kush','Conservé à froid pour préserver un maximum de terpènes.')">Voir</button>
    </div>
  </div>

  <!-- ZIP 0.9 -->
  <div class="category">
    <h2>📦 ZIP 0.9</h2>
    <div class="product">
      <p>ZIP Cali</p>
      <button onclick="openDetails('ZIP Cali','Conditionnement ZIP 0.9, qualité premium.')">Voir</button>
    </div>
  </div>

  <!-- Beuh -->
  <div class="category">
    <h2>🌿 Beuh</h2>
    <div class="product">
      <p>OG Kush</p>
      <button onclick="openDetails('OG Kush','Indica puissante, relaxante, saveur terreuse.')">Voir</button>
    </div>
  </div>
</div>

<!-- POPUP PRODUIT -->
<div id="details">
  <div class="box">
    <h2 id="dTitle"></h2>
    <p id="dDesc"></p>

    <select>
      <option>1g</option>
      <option>3g</option>
      <option>5g</option>
    </select>

    <button style="margin-top:10px;">Ajouter au panier</button>
    <button class="close" onclick="closeDetails()">Fermer</button>
  </div>
</div>

<script>
function openDetails(title, desc) {
  document.getElementById("dTitle").innerText = title;
  document.getElementById("dDesc").innerText = desc;
  document.getElementById("details").style.display = "block";
}

function closeDetails() {
  document.getElementById("details").style.display = "none";
}
</script>
</body>
</html>
