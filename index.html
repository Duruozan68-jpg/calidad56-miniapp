<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calidad56</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --bg:#0b0f14;
  --card:#101826;
  --line:rgba(255,255,255,.12);
  --text:#fff;
  --muted:rgba(255,255,255,.65);
  --gold:#d6b56d;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  padding-bottom:80px;
}
header{
  text-align:center;
  padding:20px 14px;
}
h1{
  margin:0;
  font-size:34px;
  letter-spacing:2px;
  color:var(--gold);
}
.sub{color:var(--muted);margin-top:6px}

.filters{
  display:flex;
  gap:10px;
  padding:0 14px;
}
select{
  flex:1;
  padding:12px;
  border-radius:14px;
  background:#121a2a;
  border:1px solid var(--line);
  color:#fff;
}

.section{
  display:flex;
  justify-content:space-between;
  padding:16px 14px 10px;
}
.section h2{margin:0}
.count{color:var(--muted)}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:0 14px;
}
.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
}
.media{
  height:150px;
  position:relative;
}
.media img,.media video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.play{
  position:absolute;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,.6);
  padding:8px;
  border-radius:50%;
}
.badge{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#fff;
  color:#000;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}
.body{padding:10px}
.name{font-weight:900}
.farm{
  margin-top:6px;
  font-size:13px;
  color:var(--muted);
}

nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  background:#0f1420;
  border-top:1px solid var(--line);
}
nav button{
  background:none;
  border:none;
  color:#fff;
  font-size:14px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:flex-end;
}
.sheet{
  width:100%;
  background:#0f1420;
  border-radius:18px 18px 0 0;
  padding:14px;
  max-height:90vh;
  overflow:auto;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:var(--gold);
  color:#000;
  font-weight:900;
  margin-top:10px;
}
.btn2{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:none;
  color:#fff;
  margin-top:8px;
}

.cartRow{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-top:1px solid var(--line);
}
.qty button{
  background:none;
  border:1px solid var(--line);
  color:#fff;
  padding:6px 10px;
  border-radius:10px;
}
input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#121a2a;
  color:#fff;
  margin-top:8px;
}
</style>
</head>

<body>
<header>
  <h1>ALLFARMZ</h1>
  <div class="sub">mini‑application</div>
</header>

<div class="filters">
  <select id="cat"></select>
  <select id="farm"></select>
</div>

<div class="section">
  <h2>Produits disponibles</h2>
  <div class="count"><span id="count">0</span> résultats</div>
</div>

<div class="grid" id="grid"></div>

<!-- PANIER -->
<div class="modal" id="cartModal">
  <div class="sheet">
    <h3>🛒 Panier</h3>
    <div id="cartList"></div>
    <div id="total" style="margin-top:10px;font-weight:900"></div>

    <input id="buyerName" placeholder="Nom">
    <input id="buyerPhone" placeholder="Téléphone">

    <button class="btn" onclick="checkout()">Commander</button>
    <button class="btn2" onclick="closeCart()">Fermer</button>
  </div>
</div>

<nav>
  <button onclick="scrollTo(0,0)">🏠 Menu</button>
  <button onclick="openCart()">🛒 Panier (<span id="cartCount">0</span>)</button>
  <button onclick="contact()">✉️ Contact</button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const PRODUCTS = [
  {
    id:"p1",
    name:"Brides Maid",
    category:"Static us",
    farm:"Calitefarm",
    country:"🇺🇸",
    price:25,
    video:"https://TONSITE.com/bridesmaid.mp4"
  },
  {
    id:"p2",
    name:"Autumn",
    category:"Static us",
    farm:"Calitefarm",
    country:"🇺🇸",
    price:35,
    video:"https://TONSITE.com/autumn.mp4"
  },
  {
    id:"p3",
    name:"OG Kush",
    category:"Static us",
    farm:"Calitefarm",
    country:"🇺🇸",
    price:20,
    video:"https://TONSITE.com/ogkush.mp4"
  }
];

const state={
  cat:"",
  farm:"",
  cart: JSON.parse(localStorage.getItem("cart")||"{}")
};

const $=id=>document.getElementById(id);

function fillFilters(){
  $("cat").innerHTML='<option value="">Toutes les catégories</option>'+[...new Set(PRODUCTS.map(p=>p.category))].map(c=>`<option>${c}</option>`).join("");
  $("farm").innerHTML='<option value="">Toutes les farms</option>'+[...new Set(PRODUCTS.map(p=>p.farm))].map(f=>`<option>${f}</option>`).join("");
  $("cat").onchange=e=>{state.cat=e.target.value;render()};
  $("farm").onchange=e=>{state.farm=e.target.value;render()};
}

function render(){
  const grid=$("grid");grid.innerHTML="";
  const f=PRODUCTS.filter(p=>(!state.cat||p.category==state.cat)&&(!state.farm||p.farm==state.farm));
  $("count").textContent=f.length;
  f.forEach(p=>{
    grid.innerHTML+=`
      <div class="card" onclick="add('${p.id}')">
        <div class="media">
          <video src="${p.video}" muted autoplay loop playsinline></video>
          <div class="badge">${p.category}</div>
        </div>
        <div class="body">
          <div class="name">${p.name}</div>
          <div class="farm">${p.farm} ${p.country}</div>
        </div>
      </div>`;
  });
  updateCart();
}

function add(id){
  state.cart[id]=(state.cart[id]||0)+1;
  updateCart();
}

function updateCart(){
  localStorage.setItem("cart",JSON.stringify(state.cart));
  $("cartCount").textContent=Object.values(state.cart).reduce((a,b)=>a+b,0);
}

function openCart(){ $("cartModal").style.display="flex"; renderCart(); }
function closeCart(){ $("cartModal").style.display="none"; }

function renderCart(){
  const list=$("cartList"); list.innerHTML="";
  let total=0;
  for(const id in state.cart){
    const p=PRODUCTS.find(x=>x.id==id);
    const q=state.cart[id];
    total+=p.price*q;
    list.innerHTML+=`
      <div class="cartRow">
        <div>${p.name} x${q}</div>
        <div>${p.price*q}€</div>
      </div>`;
  }
  $("total").textContent="Total : "+total+"€";
}

function checkout(){
  const name=$("buyerName").value.trim();
  const phone=$("buyerPhone").value.trim();
  if(!name||!phone){alert("Nom et téléphone requis");return;}

  let lines=[];
  let total=0;
  for(const id in state.cart){
    const p=PRODUCTS.find(x=>x.id==id);
    const q=state.cart[id];
    lines.push(`• ${p.name} x${q} (${p.price}€)`);
    total+=p.price*q;
  }

  const text=`🧾 NOUVELLE COMMANDE

👤 Nom : ${name}
📞 Téléphone : ${phone}

${lines.join("\n")}

💰 Total : ${total} €`;

  tg.close();
  tg.openTelegramLink(
    "https://t.me/LaBete56text="+encodeURIComponent(text)
  );

  state.cart={};
  updateCart();
}

function contact(){
  tg.openTelegramLink("https://t.me/LaBete56");
}

fillFilters();
render();
</script>
</body>
</html>
