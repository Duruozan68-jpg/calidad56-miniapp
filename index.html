<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calidad</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* ===== DESIGN GLOBAL ===== */
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont;
  background:#0b0f14;
  color:#fff;
}
button{cursor:pointer}
.hidden{display:none}

/* ===== HEADER ===== */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px;
  background:#121826;
}
header h1{
  margin:0;
  font-size:22px;
  letter-spacing:1px;
}
header button{
  background:none;
  border:none;
  color:#fff;
  font-size:22px;
}

/* ===== PRODUITS ===== */
.section{
  padding:14px;
}
.section h2{
  margin-bottom:12px;
  font-size:20px;
}
.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.product{
  background:#151c2f;
  border-radius:14px;
  padding:10px;
}
.product img{
  width:100%;
  border-radius:12px;
}
.product h3{
  margin:8px 0 4px;
}
.product p{
  font-size:13px;
  opacity:.8;
}
.product button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:#000;
  font-weight:700;
}

/* ===== PANIER ===== */
#cartPage,#accountPage{display:none}
.cart-item{
  background:#151c2f;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}
.total{
  font-size:20px;
  font-weight:700;
  margin-top:10px;
}

/* ===== BOTTOM NAV ===== */
nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#121826;
  display:flex;
}
nav button{
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:#fff;
  font-size:14px;
}
nav button.active{
  background:#2ecc71;
  color:#000;
  font-weight:700;
}
</style>
</head>

<body>

<header>
  <button onclick="openCategories()">☰</button>
  <h1>Calidad</h1>
  <button onclick="showCart()">🛒</button>
</header>

<!-- MENU -->
<div id="menuPage" class="section">
  <h2>Produits disponibles</h2>
  <div class="products" id="products"></div>
</div>

<!-- PANIER -->
<div id="cartPage" class="section">
  <h2>Mon Panier</h2>
  <div id="cartItems"></div>
  <div class="total" id="cartTotal"></div>

  <h3>Type de retrait</h3>
  <button onclick="orderMeetup()">Meetup</button>
  <button onclick="showDelivery()">Livraison</button>

  <div id="deliveryBox" class="hidden">
    <input id="address" placeholder="Adresse complète">
    <select id="homeType">
      <option>Maison</option>
      <option>Appartement</option>
      <option>Hotel</option>
    </select>
    <button onclick="orderDelivery()">Commander</button>
  </div>
</div>

<!-- COMPTE -->
<div id="accountPage" class="section">
  <h2>Mon Compte</h2>
  <div id="orders"></div>
  <button onclick="adminLogin()">Admin Panel</button>

  <div id="adminBox" class="hidden">
    <input id="pName" placeholder="Nom produit">
    <input id="pPrice" placeholder="Prix">
    <button onclick="addProduct()">Ajouter</button>
  </div>
</div>

<!-- NAV -->
<nav>
  <button onclick="showMenu()" class="active">Menu</button>
  <button onclick="showMenu()">Menu</button>
  <button onclick="showCart()">Panier</button>
  <button onclick="showAccount()">Compte</button>
</nav>

<script>
/* ===== CONFIG ===== */
const SECRETARY_LINK="https://t.me/Calidad_Secretaire";
const ADMIN_CODE="2810";

/* ===== DATA ===== */
let products=[
  {id:1,name:"Lemon Cherry Gelato",price:350,desc:"Cali premium"},
  {id:2,name:"Brides Maid",price:350,desc:"Static US"}
];
let cart=[];
let orders=[];

/* ===== RENDER ===== */
function renderProducts(){
  const box=document.getElementById("products");
  box.innerHTML="";
  products.forEach(p=>{
    box.innerHTML+=`
    <div class="product">
      <img src="https://via.placeholder.com/300">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <button onclick="addToCart(${p.id})">Ajouter</button>
    </div>`;
  });
}
renderProducts();

/* ===== PANIER ===== */
function addToCart(id){
  const p=products.find(x=>x.id===id);
  cart.push(p);
  alert("Ajouté au panier");
}
function showCart(){
  toggle("cartPage");
  const box=document.getElementById("cartItems");
  box.innerHTML="";
  let total=0;
  cart.forEach(p=>{
    total+=p.price;
    box.innerHTML+=`<div class="cart-item">${p.name} - ${p.price}€</div>`;
  });
  document.getElementById("cartTotal").innerText="Total: "+total+"€";
}
function orderMeetup(){
  const msg="Commande Meetup:\n"+cart.map(p=>p.name).join(", ");
  window.open(SECRETARY_LINK+"?text="+encodeURIComponent(msg));
}
function showDelivery(){
  document.getElementById("deliveryBox").classList.remove("hidden");
}
function orderDelivery(){
  const addr=document.getElementById("address").value;
  const home=document.getElementById("homeType").value;
  const msg="Commande Livraison:\n"+cart.map(p=>p.name).join(", ")+"\n"+addr+" ("+home+")";
  window.open(SECRETARY_LINK+"?text="+encodeURIComponent(msg));
}

/* ===== NAV ===== */
function toggle(id){
  ["menuPage","cartPage","accountPage"].forEach(p=>document.getElementById(p).style.display="none");
  document.getElementById(id).style.display="block";
}
function showMenu(){toggle("menuPage")}
function showAccount(){toggle("accountPage")}

/* ===== ADMIN ===== */
function adminLogin(){
  const c=prompt("Code admin ?");
  if(c===ADMIN_CODE){
    document.getElementById("adminBox").classList.remove("hidden");
  }
}
function addProduct(){
  const n=document.getElementById("pName").value;
  const pr=parseFloat(document.getElementById("pPrice").value);
  products.push({id:Date.now(),name:n,price:pr,desc:""});
  renderProducts();
}
</script>

</body>
</html>
