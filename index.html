<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Calidad56</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --gold:#d6b56d;
      --gold2:#caa14a;
      --text:#ffffff;
      --muted:rgba(255,255,255,.68);
      --line:rgba(255,255,255,.14);
      --panel:rgba(12,16,22,.78);
      --panel2:rgba(10,14,18,.90);
      --danger:#ff5a5a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      padding-bottom:86px;
      background:
        linear-gradient(rgba(0,0,0,.62), rgba(0,0,0,.62)),
        url("background.png");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    header{
      padding:18px 14px 8px;
      text-align:center;
    }
    .brand{
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    .logo{
      width:44px; height:44px; border-radius:14px;
      display:grid; place-items:center;
      background:linear-gradient(145deg, rgba(214,181,109,.30), rgba(214,181,109,.08));
      border:1px solid var(--line);
      color:var(--gold);
      font-weight:1000;
      letter-spacing:.5px;
    }
    h1{
      margin:0;
      font-size:32px;
      letter-spacing:1.5px;
      color:var(--gold);
      line-height:1.05;
    }
    .sub{margin-top:6px;color:var(--muted);font-size:13px}

    .filters{
      display:flex; gap:10px;
      padding: 10px 14px 0;
    }
    select, input{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(14,18,25,.84);
      color:var(--text);
      outline:none;
    }

    .section{
      padding: 14px 14px 10px;
      display:flex; justify-content:space-between; align-items:baseline;
    }
    .section h2{margin:0;font-size:20px;font-weight:1000}
    .count{color:var(--muted);font-size:13px}

    .grid{
      padding: 0 14px 16px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,.25);
    }
    .media{
      position:relative;
      height:150px;
      background:#070b10;
      overflow:hidden;
    }
    .media video,.media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .badge{
      position:absolute;
      right:10px;
      bottom:10px;
      background:rgba(255,255,255,.92);
      color:#111;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
    }
    .play{
      position:absolute;
      left:10px;
      bottom:10px;
      width:42px; height:42px;
      border-radius:999px;
      display:grid; place-items:center;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(6px);
      font-size:18px;
    }
    .body{padding:12px}
    .name{font-weight:1000;font-size:15px}
    .meta{margin-top:6px;color:var(--muted);font-size:12px}
    .pillRow{margin-top:10px; display:flex; gap:8px; flex-wrap:wrap}
    .pill{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.14);
      color:rgba(255,255,255,.86);
      font-size:12px;
      display:inline-flex;
      gap:6px;
      align-items:center;
    }
    .priceLine{margin-top:10px;color:var(--gold);font-weight:1000}

    .optRow{
      margin-top:10px;
      display:flex;
      gap:8px;
    }
    .optRow select{flex:1}
    .addBtn{
      width:100%;
      margin-top:10px;
      padding:12px;
      border:none;
      border-radius:14px;
      background:linear-gradient(180deg, var(--gold), var(--gold2));
      color:#111;
      font-weight:1000;
      font-size:15px;
    }

    nav{
      position:fixed;
      left:0; right:0; bottom:0;
      background:var(--panel2);
      border-top:1px solid var(--line);
      backdrop-filter: blur(10px);
      display:flex;
      justify-content:space-around;
      padding:10px 0;
      z-index:50;
    }
    nav button{
      background:transparent;
      border:none;
      color:rgba(255,255,255,.86);
      font-size:14px;
    }

    .modal{
      position:fixed; inset:0;
      background:rgba(0,0,0,.65);
      display:none;
      align-items:flex-end;
      z-index:60;
    }
    .sheet{
      width:100%;
      max-height:88vh;
      overflow:auto;
      background:rgba(10,14,18,.96);
      border:1px solid var(--line);
      border-radius:18px 18px 0 0;
      padding:14px;
    }
    .sheetTop{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
    }
    .sheetTop h3{margin:0;font-size:18px}
    .x{
      width:38px;height:38px;
      border-radius:12px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      font-weight:900;
    }

    .cartEmpty{color:var(--muted);padding:10px 0}
    .cartItem{
      padding:12px 0;
      border-top:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .cartLeft{min-width:0}
    .cartTitle{font-weight:1000}
    .cartSub{color:var(--muted);font-size:12px;margin-top:4px}
    .cartRight{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
    .qtyRow{display:flex;align-items:center;gap:8px}
    .qbtn{
      width:34px;height:34px;border-radius:12px;
      border:1px solid var(--line);
      background:transparent;color:var(--text);
      font-weight:1000;
    }
    .del{
      border:none;
      background:transparent;
      color:var(--danger);
      font-weight:900;
      font-size:13px;
      padding:0;
    }
    .totalRow{
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      font-weight:1000;
      border-top:1px solid var(--line);
      padding-top:12px;
    }

    .btn{
      width:100%;
      margin-top:12px;
      padding:14px;
      border:none;
      border-radius:14px;
      background:linear-gradient(180deg, var(--gold), var(--gold2));
      color:#111;
      font-weight:1000;
      font-size:16px;
    }
    .btn2{
      width:100%;
      margin-top:10px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      font-weight:900;
      font-size:15px;
    }
    .mini{margin-top:8px;color:var(--muted);font-size:12px}
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <div class="logo">C56</div>
      <div>
        <h1>Calidad56</h1>
        <div class="sub">Mini‑app Telegram • Catalogue • Panier • Commande</div>
      </div>
    </div>
  </header>

  <div class="filters">
    <select id="cat"></select>
    <select id="farm"></select>
  </div>

  <div style="padding:10px 14px 0">
    <input id="search" placeholder="Rechercher un produit…" />
  </div>

  <div class="section">
    <h2>Produits disponibles</h2>
    <div class="count"><span id="count">0</span> résultats</div>
  </div>

  <div class="grid" id="grid"></div>

  <!-- Cart modal -->
  <div class="modal" id="cartModal">
    <div class="sheet">
      <div class="sheetTop">
        <h3>🛒 Panier</h3>
        <button class="x" onclick="closeCart()">✕</button>
      </div>

      <div id="cartList"></div>

      <div class="totalRow" id="totalRow" style="display:none">
        <div>Total</div>
        <div id="totalValue">0 €</div>
      </div>

      <input id="buyerName" placeholder="Nom" />
      <input id="buyerPhone" placeholder="Téléphone" />

      <button class="btn" onclick="checkout()">✅ Commander</button>
      <button class="btn2" onclick="clearCart()">Vider le panier</button>

      <div class="mini">
        Sans bot : après “Commander”, Telegram ouvre “Partager” avec le message pré‑rempli.
        Tu peux l’envoyer à “Messages enregistrés” ou à <b>@LaBete56</b>.
      </div>
    </div>
  </div>

  <nav>
    <button onclick="scrollToTop()">🏠 Menu</button>
    <button onclick="openCart()">🛒 Panier (<span id="cartCount">0</span>)</button>
    <button onclick="contact()">✉️ Contact</button>
  </nav>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  // ✅ Contact (ton Telegram)
  const CONTACT = "LaBete56";

  // ✅ PRODUITS : plusieurs prix/options par produit
  // IMPORTANT: video doit être un lien mp4 direct (sinon ça ne lira pas sur iPhone/Telegram)
  const PRODUCTS = [
    {
      id:"p1",
      name:"Brides Maid",
      category:"Mouss",
      farm:"NoFarm",
      country:"🇺🇸",
      video:"",
      img:"https://share.icloud.com/photos/05eIHoBqP7rWCSoK6-r4BoBgA",
      options:[
        { label:"5g",  price:30 },
        { label:"10g", price:50 },
        { label:"25g", price:100 }
      ]
    },
    {
      id:"p2",
      name:"Autumn",
      category:"Static US",
      farm:"Calitefarm",
      country:"🇺🇸",
      video:"https://www.w3schools.com/html/movie.mp4",
      img:"",
      options:[
        { label:"5g",  price:30 },
        { label:"10g", price:55 }
      ]
    },
    {
      id:"p3",
      name:"OG Kush",
      category:"Static US",
      farm:"Calitefarm",
      country:"🇺🇸",
      video:"https://www.w3schools.com/html/mov_bbb.mp4",
      img:"",
      options:[
        { label:"5g",  price:20 },
        { label:"10g", price:38 }
      ]
    }
  ];

  const $ = (id)=>document.getElementById(id);
  const uniq = (arr)=>[...new Set(arr)];
  const money = (n)=>`${Number(n).toFixed(2)} €`;

  // cart structure: { "p1|10g": { pid, name, label, unitPrice, qty } }
  const state = {
    cat:"",
    farm:"",
    q:"",
    cart: JSON.parse(localStorage.getItem("cart_v2") || "{}")
  };

  function saveCart(){
    localStorage.setItem("cart_v2", JSON.stringify(state.cart));
    $("cartCount").textContent = Object.values(state.cart).reduce((s,i)=>s+i.qty,0);
  }

  function fillFilters(){
    const cats  = ["Toutes les catégories", ...uniq(PRODUCTS.map(p=>p.category))];
    const farms = ["Toutes les farms", ...uniq(PRODUCTS.map(p=>p.farm))];

    $("cat").innerHTML  = cats.map((c,i)=>`<option value="${i===0?"":c}">${c}</option>`).join("");
    $("farm").innerHTML = farms.map((f,i)=>`<option value="${i===0?"":f}">${f}</option>`).join("");

    $("cat").onchange = (e)=>{ state.cat=e.target.value; render(); };
    $("farm").onchange = (e)=>{ state.farm=e.target.value; render(); };
    $("search").oninput = (e)=>{ state.q = e.target.value.toLowerCase(); render(); };
  }

  function render(){
    const grid = $("grid");
    grid.innerHTML = "";

    const filtered = PRODUCTS.filter(p=>{
      const okC = !state.cat || p.category === state.cat;
      const okF = !state.farm || p.farm === state.farm;
      const okQ = !state.q || p.name.toLowerCase().includes(state.q);
      return okC && okF && okQ;
    });

    $("count").textContent = filtered.length;

    filtered.forEach(p=>{
      const optId = `opt_${p.id}`;
      const optHtml = p.options.map((o,idx)=>`<option value="${idx}">${o.label} – ${o.price}€</option>`).join("");

      const hasVideo = p.video && p.video.trim().length;
      const mediaHtml = hasVideo
        ? `<video src="${p.video}" muted autoplay loop playsinline></video><div class="play">▶</div>`
        : `<img src="${p.img || "https://via.placeholder.com/800x600?text=Produit"}" alt="">`;

      grid.innerHTML += `
        <div class="card">
          <div class="media">
            ${mediaHtml}
            <div class="badge">${p.category} ${p.country}</div>
          </div>
          <div class="body">
            <div class="name">${p.name}</div>
            <div class="meta">${p.farm} • ${p.country}</div>

            <div class="pillRow">
              <span class="pill">🌾 ${p.farm}</span>
              <span class="pill">${p.country}</span>
            </div>

            <div class="optRow">
              <select id="${optId}">${optHtml}</select>
            </div>

            <button class="addBtn" onclick="addSelected('${p.id}','${optId}')">Ajouter au panier</button>
          </div>
        </div>
      `;
    });

    saveCart();
  }

  function addSelected(pid, selectId){
    const p = PRODUCTS.find(x=>x.id===pid);
    if(!p) return;

    const idx = Number(document.getElementById(selectId).value || 0);
    const opt = p.options[idx];
    const key = `${pid}|${opt.label}`;

    if(!state.cart[key]){
      state.cart[key] = { pid, name:p.name, label:opt.label, unitPrice:opt.price, qty:1 };
    } else {
      state.cart[key].qty += 1;
    }

    saveCart();
    tg.HapticFeedback?.impactOccurred?.("light");
  }

  function openCart(){
    $("cartModal").style.display="flex";
    renderCart();
  }
  function closeCart(){
    $("cartModal").style.display="none";
  }

  function changeQty(key, delta){
    if(!state.cart[key]) return;
    state.cart[key].qty += delta;
    if(state.cart[key].qty <= 0) delete state.cart[key];
    saveCart();
    renderCart();
  }

  function removeItem(key){
    delete state.cart[key];
    saveCart();
    renderCart();
  }

  function clearCart(){
    state.cart = {};
    saveCart();
    renderCart();
  }

  function renderCart(){
    const list = $("cartList");
    list.innerHTML = "";

    const items = Object.entries(state.cart).map(([key,val])=>({ key, ...val }));
    if(items.length === 0){
      list.innerHTML = `<div class="cartEmpty">Ton panier est vide.</div>`;
      $("totalRow").style.display="none";
      return;
    }

    let total = 0;
    items.forEach(it=>{
      total += it.unitPrice * it.qty;
      list.innerHTML += `
        <div class="cartItem">
          <div class="cartLeft">
            <div class="cartTitle">${it.name} (${it.label})</div>
            <div class="cartSub">${money(it.unitPrice)} / unité</div>
          </div>
          <div class="cartRight">
            <div class="qtyRow">
              <button class="qbtn" onclick="changeQty('${it.key}', -1)">−</button>
              <div style="min-width:18px;text-align:center;font-weight:1000">${it.qty}</div>
              <button class="qbtn" onclick="changeQty('${it.key}', 1)">+</button>
            </div>
            <button class="del" onclick="removeItem('${it.key}')">❌ Supprimer</button>
          </div>
        </div>
      `;
    });

    $("totalRow").style.display="flex";
    $("totalValue").textContent = money(total);
  }

  function checkout(){
    const name  = $("buyerName").value.trim();
    const phone = $("buyerPhone").value.trim();

    if(!name || !phone){
      tg.showPopup?.({ title:"Infos manquantes", message:"Ajoute ton nom et ton téléphone.", buttons:[{type:"ok"}] });
      return;
    }

    const items = Object.values(state.cart);
    if(items.length === 0){
      tg.showPopup?.({ title:"Panier vide", message:"Ajoute au moins un produit.", buttons:[{type:"ok"}] });
      return;
    }

    let total = 0;
    const lines = items.map(i=>{
      total += i.unitPrice * i.qty;
      return `• ${i.name} (${i.label}) x${i.qty} — ${i.unitPrice}€`;
    }).join("\n");

    const msg =
`🧾 NOUVELLE COMMANDE

👤 Nom : ${name}
📞 Téléphone : ${phone}

📦 Produits :
${lines}

💰 Total : ${total.toFixed(2)} €

➡️ Destinataire : @${CONTACT}`;

    // ✅ Sans bot : le plus fiable = share/url (l’utilisateur choisit le chat)
    tg.openTelegramLink("https://t.me/LaBete56" + encodeURIComponent(msg));

    // Option: vider panier après ouverture partage
    clearCart();
    closeCart();
  }

  function contact(){
    tg.openTelegramLink("https://t.me/AllFarmz44Bot" + CONTACT);
  }
  function scrollToTop(){
    window.scrollTo({ top:0, behavior:"smooth" });
  }

  fillFilters();
  render();
</script>
</body>
</html>
