<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calidad West</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #fff;
      padding-bottom: 120px;
    }
    h1 { padding: 16px; margin: 0 }
    .product {
      background: #111827;
      border: 1px solid #2a3142;
      border-radius: 14px;
      margin: 12px;
      padding: 12px;
    }
    .price { color: #22c55e; font-weight: bold }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      margin-top: 8px;
    }
    .cart {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0f1420;
      border-top: 1px solid #2a3142;
      padding: 12px;
    }
  </style>
</head>

<body>

<h1>🛒 Calidad West</h1>

<div class="product">
  <div>Brides Maid</div>
  <div class="price">25 €</div>
  <button onclick="add('Brides Maid',25)">Ajouter</button>
</div>

<div class="product">
  <div>OG Kush</div>
  <div class="price">20 €</div>
  <button onclick="add('OG Kush',20)">Ajouter</button>
</div>

<div class="cart">
  Articles : <span id="count">0</span><br>
  Total : <span id="total">0</span> €<br><br>
  <button onclick="checkout()">Commander</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  let cart = [];
  let total = 0;

  function add(name, price) {
    cart.push({ name, price });
    total += price;
    document.getElementById("count").innerText = cart.length;
    document.getElementById("total").innerText = total;
  }

  function checkout() {
    tg.sendData(JSON.stringify({
      action: "order",
      items: cart,
      total: total
    }));
    alert("Commande envoyée ✅");
    cart = [];
    total = 0;
    document.getElementById("count").innerText = 0;
    document.getElementById("total").innerText = 0;
  }
</script>

</body>
</html>
