<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calidad West</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: url("./assets/background.png") center / cover no-repeat fixed;
  color: white;
}

.overlay {
  min-height: 100vh;
  background: rgba(0,0,0,0.65);
  padding: 15px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.category {
  background: rgba(0,0,0,0.7);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

.category h2 {
  margin-top: 0;
  color: #2ecc71;
}

.product {
  margin-top: 10px;
}

select, button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 8px;
}

button {
  background: #2ecc71;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

#details {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  padding: 20px;
}

#details .box {
  background: #111;
  border-radius: 12px;
  padding: 15px;
}

.close {
  background: #e74c3c;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="overlay">
  <h1>🌿 Calidad West</h1>

  <!-- Mousseux -->
  <div class="category">
    <h2>💨 Mousseux</h2>
    <div class="product">
      <p>Ice Hash</p>
      <button onclick="openDetails('Ice Hash','Mousseux ultra pur, texture crémeuse, goût intense.')">Voir</button>
    </div>
  </div>

  <!-- Filtrer -->
  <div class="category">
    <h2>🧪 Filtrer</h2>
    <div class="product">
      <p>Dry Sift Premium</p>
      <button onclick="openDetails('Dry Sift','Filtration fine, haute concentration.')">Voir</button>
    </div>
  </div>

  <!-- Frozen -->
  <div class="category">
    <h2>❄️ Frozen</h2>
    <div class="product">
      <p>Frozen Kush</p>
      <button onclick="openDetails('Frozen Kush','Conservé à froid pour un maximum de terpènes.')">Voir</button>
    </div>
  </div>

  <!-- ZIP 0.9 -->
  <div class="category">
    <h2>📦 ZIP 0.9</h2>
    <div class="product">
      <p>ZIP Cali</p>
      <button onclick="openDetails('ZIP Cali','Conditionnement ZIP 0.9, qualité premium.')">Voir</button>
    </div>
  </div>

  <!-- Beuh -->
  <div class="category">
    <h2>🌿 Beuh</h2>
    <div class="product">
      <p>OG Kush</p>
      <button onclick="openDetails('OG Kush','Indica puissante, relaxante, goût terreux.')">Voir</button>
    </div>
  </div>
</div>

<!-- Détails produit -->
<div id="details">
  <div class="box">
    <h2 id="dTitle"></h2>
    <p id="dDesc"></p>

    <select>
      <option>1g</option>
      <option>3g</option>
      <option>5g</option>
    </select>

    <button>Ajouter au panier</button>
    <button class="close" onclick="closeDetails()">Fermer</button>
  </div>
</div>

<script>
function openDetails(title, desc) {
  document.getElementById("dTitle").innerText = title;
  document.getElementById("dDesc").innerText = desc;
  document.getElementById("details").style.display = "block";
}

function closeDetails() {
  document.getElementById("details").style.display = "none";
}
</script>
</body>
</html>
