<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calidad56 Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#0b0f14; --card:#121723; --muted:#9aa4b2; --line:#2a3142;
      --gold:#d6b56d; --btn:#22c55e;
    }
    body{margin:0;font-family:Arial,system-ui;background:var(--bg);color:#fff;padding-bottom:76px}
    header{padding:16px;text-align:center;background:linear-gradient(180deg,#1a1f2b,#0b0f14)}
    header h1{margin:0;font-size:28px;letter-spacing:2px}
    header p{margin:6px 0 0;color:var(--muted)}
    .wrap{padding:12px}
    .filters{display:flex;gap:10px;margin-bottom:12px}
    select,input{flex:1;padding:10px;border-radius:10px;background:#151a23;color:#fff;border:1px solid var(--line)}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
    .card img{width:100%;height:120px;object-fit:cover;background:#0f1420}
    .card .b{padding:10px}
    .tag{font-size:12px;color:var(--muted)}
    .name{font-weight:800;margin-top:6px}
    .price{margin-top:6px;color:var(--gold);font-weight:700}
    .btn{width:100%;margin-top:10px;padding:10px;border-radius:10px;border:none;background:var(--btn);font-weight:800}
    .btn2{width:100%;margin-top:10px;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0f1420;color:#fff;font-weight:800}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .qty{display:flex;gap:8px;align-items:center}
    .qbtn{padding:6px 10px;border-radius:10px;border:1px solid var(--line);background:#0f1420;color:#fff}
    nav{position:fixed;left:0;right:0;bottom:0;background:#0f1420;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:10px 0}
    nav button{background:transparent;border:none;color:#fff;opacity:.85;font-size:14px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end}
    .sheet{background:#0f1420;border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-height:85vh;overflow:auto}
    .sheet h2{margin:0;padding:14px 14px 0}
    .sheet .p{padding:10px 14px;color:var(--muted)}
    .cartItem{padding:12px 14px;border-top:1px solid var(--line)}
    .total{padding:12px 14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-weight:900}
    .actions{padding:12px 14px}
    .mini{font-size:12px;color:var(--muted);margin-top:6px}
  </style>
</head>
<body>
  <header>
    <h1>CALIDAD56</h1>
    <p>Catalogue • Panier • Commande</p>
  </header>

  <div class="wrap">
    <div class="filters">
      <select id="category"></select>
      <select id="farm"></select>
    </div>
    <input id="search" placeholder="Rechercher un produit…" />
    <div style="height:12px"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="modal" id="cartModal">
    <div class="sheet">
      <h2>🛒 Panier</h2>
      <div class="p" id="cartEmpty">Ton panier est vide.</div>
      <div id="cartList"></div>
      <div class="total" id="cartTotal" style="display:none">
        <div>Total</div><div id="totalValue">0 €</div>
      </div>

      <div class="actions">
        <input id="buyerName" placeholder="Ton nom" />
        <input id="buyerPhone" placeholder="Téléphone" />
        <button class="btn" onclick="checkout()">✅ Commander</button>
        <button class="btn2" onclick="closeCart()">Fermer</button>
        <div class="mini">La commande est envoyée au bot Telegram (et paiement Stripe possible ensuite).</div>
      </div>
    </div>
  </div>

  <nav>
    <button onclick="openHome()">🏠 Menu</button>
    <button onclick="openCart()">🛒 Panier (<span id="cartCount">0</span>)</button>
    <button onclick="openContact()">✉️ Contact</button>
  </nav>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  // ✅ Produits (tu modifies ici)
  const PRODUCTS = [
    { id:"p1", name:"Brides Maid", category:"Flower", farm:"Calitefarm", country:"🇺🇸", price:25, img:"https://via.placeholder.com/600x400?text=Brides+Maid" },
    { id:"p2", name:"OG Kush",     category:"Flower", farm:"Calitefarm", country:"🇺🇸", price:20, img:"https://via.placeholder.com/600x400?text=OG+Kush" },
    { id:"p3", name:"Autumn",      category:"Extract",farm:"Calitefarm", country:"🇺🇸", price:35, img:"https://via.placeholder.com/600x400?text=Autumn" },
  ];

  const state = {
    category:"",
    farm:"",
    q:"",
    cart: JSON.parse(localStorage.getItem("cart") || "{}") // {id: qty}
  };

  const $ = (id)=>document.getElementById(id);

  function uniq(arr){ return [...new Set(arr)]; }

  function fillFilters(){
    const cats = ["Toutes les catégories", ...uniq(PRODUCTS.map(p=>p.category))];
    const farms= ["Toutes les farms", ...uniq(PRODUCTS.map(p=>p.farm))];

    $("category").innerHTML = cats.map((c,i)=>`<option value="${i===0?"":c}">${c}</option>`).join("");
    $("farm").innerHTML     = farms.map((f,i)=>`<option value="${i===0?"":f}">${f}</option>`).join("");

    $("category").onchange = (e)=>{ state.category=e.target.value; render(); };
    $("farm").onchange     = (e)=>{ state.farm=e.target.value; render(); };
    $("search").oninput    = (e)=>{ state.q=e.target.value.toLowerCase(); render(); };
  }

  function cartCount(){
    return Object.values(state.cart).reduce((a,b)=>a+b,0);
  }

  function saveCart(){
    localStorage.setItem("cart", JSON.stringify(state.cart));
    $("cartCount").textContent = cartCount();
  }

  function addToCart(id){
    state.cart[id] = (state.cart[id]||0) + 1;
    saveCart();
    tg.HapticFeedback?.impactOccurred?.("light");
  }

  function setQty(id, qty){
    if(qty<=0) delete state.cart[id];
    else state.cart[id]=qty;
    saveCart();
    renderCart();
  }

  function money(n){ return `${n.toFixed(2)} €`; }

  function render(){
    const grid = $("grid");
    grid.innerHTML = "";

    const filtered = PRODUCTS.filter(p=>{
      const okCat = !state.category || p.category===state.category;
      const okFarm= !state.farm || p.farm===state.farm;
      const okQ   = !state.q || p.name.toLowerCase().includes(state.q);
      return okCat && okFarm && okQ;
    });

    filtered.forEach(p=>{
      grid.innerHTML += `
        <div class="card">
          <img src="${p.img}" alt="">
          <div class="b">
            <div class="tag">${p.country} • ${p.category}</div>
            <div class="name">${p.name}</div>
            <div class="tag">🌾 ${p.farm}</div>
            <div class="price">${money(p.price)}</div>
            <button class="btn" onclick="addToCart('${p.id}')">Ajouter au panier</button>
          </div>
        </div>
      `;
    });

    saveCart();
  }

  function openCart(){
    $("cartModal").style.display="flex";
    renderCart();
  }
  function closeCart(){ $("cartModal").style.display="none"; }

  function renderCart(){
    const list = $("cartList");
    list.innerHTML = "";
    const items = Object.entries(state.cart).map(([id,qty])=>{
      const p = PRODUCTS.find(x=>x.id===id);
      return { ...p, qty };
    }).filter(x=>x.id);

    $("cartEmpty").style.display = items.length ? "none":"block";
    $("cartTotal").style.display = items.length ? "flex":"none";

    let total = 0;
    items.forEach(it=>{
      total += it.price * it.qty;
      list.innerHTML += `
        <div class="cartItem">
          <div class="row">
            <div>
              <div style="font-weight:800">${it.name}</div>
              <div class="tag">${it.farm} • ${money(it.price)}</div>
            </div>
            <div class="qty">
              <button class="qbtn" onclick="setQty('${it.id}', ${it.qty-1})">-</button>
              <div style="min-width:20px;text-align:center">${it.qty}</div>
              <button class="qbtn" onclick="setQty('${it.id}', ${it.qty+1})">+</button>
            </div>
          </div>
        </div>
      `;
    });

    $("totalValue").textContent = money(total);
  }

  function checkout(){
    const name = $("buyerName").value.trim();
    const phone= $("buyerPhone").value.trim();
    if(!name || !phone){
      tg.showPopup?.({title:"Infos manquantes", message:"Ajoute ton nom et ton téléphone.", buttons:[{type:"ok"}]});
      return;
    }

    const items = Object.entries(state.cart).map(([id,qty])=>{
      const p = PRODUCTS.find(x=>x.id===id);
      return { id, name:p?.name, price:p?.price, qty };
    });

    if(!items.length){
      tg.showPopup?.({title:"Panier vide", message:"Ajoute au moins un produit.", buttons:[{type:"ok"}]});
      return;
    }

    const payload = {
      action:"order",
      buyer:{ name, phone },
      items,
      ts: Date.now()
    };

    // 👉 Envoie au bot (il recevra msg.web_app_data.data)
    tg.sendData(JSON.stringify(payload));

    // reset panier
    state.cart = {};
    saveCart();
    closeCart();
    tg.showPopup?.({title:"Commande envoyée ✅", message:"On te répond dans Telegram.", buttons:[{type:"ok"}]});
  }

  function openHome(){ window.scrollTo({top:0,behavior:"smooth"}); }
  function openContact(){
    tg.showPopup?.({
      title:"Contact",
      message:"Écris directement au bot pour nous contacter.",
      buttons:[{type:"ok"}]
    });
  }

  fillFilters();
  render();
</script>
</body>
</html>
