<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Calidad • Mini‑Shop</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --bg:#0b0f14;
  --glass:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.14);
  --text:#f5f7ff;
  --muted:#b6bfd6;
  --brand:#22c55e;
  --brand2:#16a34a;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  color:var(--text);
  background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
    url("assets/background.png") center/cover fixed no-repeat;
}
header{
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(14px);
  background:rgba(0,0,0,.65);
  border-bottom:1px solid var(--line);
}
header .wrap{
  max-width:1100px;margin:auto;padding:14px;
  display:flex;gap:12px;align-items:center;
}
h1{margin:0;font-size:20px}
.search{flex:1}
.search input{
  width:100%;padding:12px 14px;border-radius:14px;
  border:1px solid var(--line);
  background:rgba(10,14,20,.8);
  color:var(--text);
}
.btn{
  padding:12px 16px;border-radius:14px;border:0;
  font-weight:800;cursor:pointer;
  background:linear-gradient(var(--brand),var(--brand2));
  color:#05250f;
}
.btn.ghost{
  background:rgba(255,255,255,.1);
  color:var(--text);border:1px solid var(--line);
}
main{max-width:1100px;margin:auto;padding:16px}
.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:14px}
.tab{
  padding:10px 14px;border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.08);
  cursor:pointer;font-weight:800;font-size:13px;
}
.tab.active{background:rgba(34,197,94,.25)}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;
}
.card{
  background:var(--glass);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  cursor:pointer;
}
.card h3{margin:10px 0 4px}
.card p{margin:0;color:var(--muted);font-size:13px}
.price{margin-top:8px;font-weight:900}
footer{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
}
footer .wrap{
  max-width:1100px;margin:auto;padding:12px;
  display:flex;justify-content:space-between;align-items:center;
}
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  display:none;z-index:50;
}
.modal.show{display:block}
.sheet{
  max-width:600px;margin:40px auto;
  background:rgba(20,26,36,.85);
  border:1px solid var(--line);
  border-radius:20px;
}
.sheet header,.sheet footer{padding:14px;border-bottom:1px solid var(--line)}
.sheet footer{border-top:1px solid var(--line);border-bottom:0}
.sheet main{padding:14px}
select{width:100%;padding:12px;border-radius:12px;
  background:rgba(10,14,20,.8);color:var(--text);border:1px solid var(--line)}
</style>
</head>

<body>

<header>
  <div class="wrap">
    <h1>🛒 Calidad</h1>
    <div class="search">
      <input id="search" placeholder="Rechercher…"/>
    </div>
    <button class="btn ghost" onclick="openCart()">Panier</button>
  </div>
</header>

<main>
  <div class="tabs" id="tabs"></div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <div class="wrap">
    <div><b id="count">0</b> article(s)</div>
    <button class="btn" onclick="checkout()">Commander</button>
  </div>
</footer>

<!-- MODAL PRODUIT -->
<div class="modal" id="productModal">
  <div class="sheet">
    <header>
      <b id="pName"></b>
      <button class="btn ghost" onclick="closeModal()">Fermer</button>
    </header>
    <main>
      <p id="pDesc"></p>
      <label>Quantité</label>
      <select id="pVariant"></select>
      <p class="price">Prix : <span id="pPrice"></span> €</p>
    </main>
    <footer>
      <button class="btn" onclick="addToCart()">Ajouter</button>
    </footer>
  </div>
</div>

<script>
const TG = window.Telegram?.WebApp || null;

const DATA={
  categories:[
    {id:"mousseux",name:"Mousseux"},
    {id:"filtrer",name:"Filtrer"},
    {id:"frozen",name:"Frozen"},
    {id:"zip",name:"ZIP 0.9"},
    {id:"beuh",name:"Beuh"}
  ],
  products:[
    {
      id:"p1",cat:"beuh",
      name:"Beuh Premium",
      desc:"Qualité supérieure, manucurée, sélection premium.",
      variants:[
        {label:"1g",price:10},
        {label:"3g",price:25},
        {label:"5g",price:30},
        {label:"10g",price:55}
      ]
    }
  ]
};

let STATE={cat:"all",cart:[],current:null};

function renderTabs(){
  const t=document.getElementById("tabs");
  t.innerHTML="";
  const mk=(id,name)=>{
    const d=document.createElement("div");
    d.className="tab"+(STATE.cat===id?" active":"");
    d.textContent=name;
    d.onclick=()=>{STATE.cat=id;renderGrid();renderTabs()};
    t.appendChild(d);
  };
  mk("all","Tout");
  DATA.categories.forEach(c=>mk(c.id,c.name));
}

function renderGrid(){
  const g=document.getElementById("grid");
  const q=document.getElementById("search").value.toLowerCase();
  g.innerHTML="";
  DATA.products
    .filter(p=>STATE.cat==="all"||p.cat===STATE.cat)
    .filter(p=>p.name.toLowerCase().includes(q))
    .forEach(p=>{
      const c=document.createElement("div");
      c.className="card";
      c.innerHTML=`
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="price">dès ${Math.min(...p.variants.map(v=>v.price))}€</div>`;
      c.onclick=()=>openProduct(p);
      g.appendChild(c);
    });
}

function openProduct(p){
  STATE.current=p;
  document.getElementById("pName").textContent=p.name;
  document.getElementById("pDesc").textContent=p.desc;
  const s=document.getElementById("pVariant");
  s.innerHTML=p.variants.map((v,i)=>
    `<option value="${i}">${v.label} — ${v.price}€</option>`).join("");
  updatePrice();
  s.onchange=updatePrice;
  document.getElementById("productModal").classList.add("show");
}
function closeModal(){document.getElementById("productModal").classList.remove("show")}
function updatePrice(){
  const v=STATE.current.variants[
    document.getElementById("pVariant").value];
  document.getElementById("pPrice").textContent=v.price;
}
function addToCart(){
  const v=STATE.current.variants[
    document.getElementById("pVariant").value];
  STATE.cart.push({name:STATE.current.name,variant:v.label,price:v.price});
  document.getElementById("count").textContent=STATE.cart.length;
  closeModal();
}
function openCart(){
  alert(STATE.cart.map(i=>`${i.name} ${i.variant} = ${i.price}€`).join("\n"));
}
function checkout(){
  if(!STATE.cart.length)return alert("Panier vide");
  const msg=STATE.cart.map(i=>`${i.name} ${i.variant} = ${i.price}€`).join("\n");
  if(TG)TG.sendData(msg);
  else alert("Commande:\n"+msg);
}

document.getElementById("search").oninput=renderGrid;
renderTabs();renderGrid();
if(TG)TG.expand();
</script>
</body>
</html>
