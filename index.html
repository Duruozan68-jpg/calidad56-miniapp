<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calidad West</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: url("./assets/background.png") center / cover no-repeat fixed;
  color: #fff;
}

.overlay {
  min-height: 100vh;
  background: rgba(0,0,0,0.7);
  padding: 15px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header p {
  margin: 5px 0 0;
  opacity: 0.8;
}

/* CATEGORY */
.category {
  margin-bottom: 25px;
}

.category h2 {
  margin-bottom: 10px;
  color: #2ecc71;
}

/* PRODUCT GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}

/* PRODUCT CARD */
.product-card {
  background: rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.product-card:hover {
  transform: scale(1.03);
  box-shadow: 0 6px 18px rgba(0,0,0,0.5);
}

.product-card h3 {
  margin: 0 0 6px;
  font-size: 16px;
}

.product-card span {
  font-size: 13px;
  opacity: 0.8;
}

/* PRODUCT PAGE (AMAZON STYLE) */
#productPage {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  padding: 15px;
}

.product-box {
  max-width: 420px;
  margin: auto;
  background: #111;
  border-radius: 18px;
  padding: 18px;
}

.product-box h2 {
  margin-top: 0;
}

.product-box p {
  opacity: 0.9;
}

select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

button {
  background: #2ecc71;
  color: #000;
  cursor: pointer;
}

button.secondary {
  background: #e74c3c;
  color: #fff;
}
</style>
</head>

<body>
<div class="overlay">

  <!-- HEADER -->
  <div class="header">
    <h1>🌿 Calidad West</h1>
    <p>Premium selection • Cali quality</p>
  </div>

  <!-- MOUSSEUX -->
  <div class="category">
    <h2>💨 Mousseux</h2>
    <div class="products">
      <div class="product-card" onclick="openProduct(
        'Ice Hash',
        'Mousseux ultra pur, texture crémeuse, goût intense.'
      )">
        <h3>Ice Hash</h3>
        <span>Ultra premium</span>
      </div>
    </div>
  </div>

  <!-- FILTRER -->
  <div class="category">
    <h2>🧪 Filtrer</h2>
    <div class="products">
      <div class="product-card" onclick="openProduct(
        'Dry Sift Premium',
        'Filtration fine, haute concentration, très aromatique.'
      )">
        <h3>Dry Sift</h3>
        <span>Qualité supérieure</span>
      </div>
    </div>
  </div>

  <!-- FROZEN -->
  <div class="category">
    <h2>❄️ Frozen</h2>
    <div class="products">
      <div class="product-card" onclick="openProduct(
        'Frozen Kush',
        'Conservé à froid pour préserver les terpènes.'
      )">
        <h3>Frozen Kush</h3>
        <span>Fraîcheur extrême</span>
      </div>
    </div>
  </div>

  <!-- ZIP -->
  <div class="category">
    <h2>📦 ZIP 0.9</h2>
    <div class="products">
      <div class="product-card" onclick="openProduct(
        'ZIP Cali',
        'Conditionnement ZIP 0.9, qualité premium.'
      )">
        <h3>ZIP Cali</h3>
        <span>Format pro</span>
      </div>
    </div>
  </div>

  <!-- BEUH -->
  <div class="category">
    <h2>🌿 Beuh</h2>
    <div class="products">
      <div class="product-card" onclick="openProduct(
        'OG Kush',
        'Indica puissante, relaxante, saveur terreuse.'
      )">
        <h3>OG Kush</h3>
        <span>Indica</span>
      </div>
    </div>
  </div>

</div>

<!-- PRODUCT PAGE -->
<div id="productPage">
  <div class="product-box">
    <h2 id="pTitle"></h2>
    <p id="pDesc"></p>

    <select>
      <option>1g</option>
      <option>3g</option>
      <option>5g</option>
    </select>

    <button>Ajouter au panier</button>
    <button class="secondary" onclick="closeProduct()">Retour</button>
  </div>
</div>

<script>
function openProduct(title, desc) {
  document.getElementById("pTitle").innerText = title;
  document.getElementById("pDesc").innerText = desc;
  document.getElementById("productPage").style.display = "block";
}

function closeProduct() {
  document.getElementById("productPage").style.display = "none";
}
</script>
</body>
</html>
