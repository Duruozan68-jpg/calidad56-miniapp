<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Calidad West</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: url("assets/background.png") no-repeat center center fixed;
      background-size: cover;
      color: white;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(0,0,0,0.6);
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #2ecc71;
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>🌿 Calidad West</h1>

    <div class="card">
      <p>Bienvenue sur la mini‑app.</p>
      <p>Les catégories arrivent juste après 👇</p>
      <button class="btn">Commander</button>
    </div>
  </div>
</body>
</html>
