<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini‑App Test</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body{font-family:Arial;background:#0b0f14;color:#fff;display:grid;place-items:center;height:100vh}
    button{padding:14px 20px;border-radius:12px;border:none;background:#22c55e;font-weight:900}
  </style>
</head>
<body>
  <h1>Mini‑app OK ✅</h1>
  <button onclick="send()">Envoyer test au bot</button>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  function send(){
    tg.sendData(JSON.stringify({
      action:"order",
      buyer:{name:"Test", phone:"000"},
      items:[{name:"Produit test", option:"x1", unitPrice:1, qty:1}],
      total:1
    }));
    alert("Données envoyées au bot ✅");
  }
</script>
</body>
</html>
