<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calidad56</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --gold:#d6b56d;
  --line:rgba(255,255,255,.15);
  --text:#fff;
  --panel:rgba(10,15,20,.85);
}
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
  color:var(--text);
  padding-bottom:90px;

  /* 🔥 TON FOND D’ÉCRAN */
  background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
    url("background.png");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

header{
  text-align:center;
  padding:22px 14px 12px;
}
h1{
  margin:0;
  font-size:34px;
  letter-spacing:2px;
  color:var(--gold);
}
.sub{opacity:.7;margin-top:6px}

.filters{
  display:flex;
  gap:10px;
  padding:0 14px;
}
select{
  flex:1;
  padding:12px;
  border-radius:14px;
  background:#0f141c;
  border:1px solid var(--line);
  color:#fff;
}

.section{
  display:flex;
  justify-content:space-between;
  padding:16px 14px 10px;
}
.count{opacity:.7}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:0 14px;
}

.card{
  background:var(--panel);
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
}

.media{
  height:150px;
  position:relative;
}
.media video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.badge{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#fff;
  color:#000;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.body{padding:10px}
.name{font-weight:900}
.farm{opacity:.7;font-size:13px;margin-top:4px}
.price{margin-top:6px;color:var(--gold);font-weight:900}

.add{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:12px;
  background:var(--gold);
  color:#000;
  font-weight:900;
}

nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  background:#000;
  border-top:1px solid var(--line);
}
nav button{
  background:none;
  border:none;
  color:#fff;
  font-size:14px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:flex-end;
}
.sheet{
  width:100%;
  background:#000;
  border-radius:18px 18px 0 0;
  padding:14px;
  max-height:90vh;
  overflow:auto;
}

.cartRow{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-top:1px solid var(--line);
}

input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#0f141c;
  color:#fff;
  margin-top:8px;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:var(--gold);
  color:#000;
  font-weight:900;
  margin-top:10px;
}
.btn2{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:none;
  color:#fff;
  margin-top:8px;
}
</style>
</head>

<body>

<header>
  <h1>Calidad56</h1>
  <div class="sub">Mini‑app Telegram</div>
</header>

<div class="filters">
  <select id="cat"></select>
  <select id="farm"></select>
</div>

<div class="section">
  <div>Produits disponibles</div>
  <div class="count"><span id="count">0</span></div>
</div>

<div class="grid" id="grid"></div>

<!-- PANIER -->
<div class="modal" id="cartModal">
  <div class="sheet">
    <h3>🛒 Panier</h3>
    <div id="cartList"></div>
    <div id="total" style="margin-top:10px;font-weight:900"></div>

    <input id="buyerName" placeholder="Nom">
    <input id="buyerPhone" placeholder="Téléphone">

    <button class="btn" onclick="checkout()">Commander</button>
    <button class="btn2" onclick="closeCart()">Fermer</button>
  </div>
</div>

<nav>
  <button onclick="scrollTo(0,0)">🏠 Menu</button>
  <button onclick="openCart()">🛒 Panier (<span id="cartCount">0</span>)</button>
  <button onclick="contact()">✉️ Contact</button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const PRODUCTS = [
  {
    id:"p1",
    name:"Brides Maid",
    category:"Static US",
    farm:"Calitefarm",
    country:"🇺🇸",
    price:25,
    video:"https://www.w3schools.com/html/mov_bbb.mp4"
  },
  {
    id:"p2",
    name:"Autumn",
    category:"Static US",
    farm:"Calitefarm",
    country:"🇺🇸",
    price:35,
    video:"https://www.w3schools.com/html/movie.mp4"
  },
  {
    id:"p3",
    name:"OG Kush",
    category:"Static US",
    farm:"Calitefarm",
    country:"🇺🇸",
    price:20,
    video:"https://www.w3schools.com/html/mov_bbb.mp4"
  }
];

const state={
  cat:"",
  farm:"",
  cart: JSON.parse(localStorage.getItem("cart")||"{}")
};

const $=id=>document.getElementById(id);

function fillFilters(){
  $("cat").innerHTML='<option value="">Toutes catégories</option>'+
    [...new Set(PRODUCTS.map(p=>p.category))]
    .map(c=>`<option>${c}</option>`).join("");
  $("farm").innerHTML='<option value="">Toutes farms</option>'+
    [...new Set(PRODUCTS.map(p=>p.farm))]
    .map(f=>`<option>${f}</option>`).join("");

  $("cat").onchange=e=>{state.cat=e.target.value;render()};
  $("farm").onchange=e=>{state.farm=e.target.value;render()};
}

function render(){
  const grid=$("grid");grid.innerHTML="";
  const f=PRODUCTS.filter(p=>
    (!state.cat||p.category==state.cat) &&
    (!state.farm||p.farm==state.farm)
  );
  $("count").textContent=f.length;

  f.forEach(p=>{
    grid.innerHTML+=`
    <div class="card">
      <div class="media">
        <video src="${p.video}" muted autoplay loop playsinline></video>
        <div class="badge">${p.category}</div>
      </div>
      <div class="body">
        <div class="name">${p.name}</div>
        <div class="farm">${p.farm} ${p.country}</div>
        <div class="price">${p.price} €</div>
        <button class="add" onclick="add('${p.id}')">Ajouter</button>
      </div>
    </div>`;
  });
  updateCart();
}

function add(id){
  state.cart[id]=(state.cart[id]||0)+1;
  updateCart();
}

function updateCart(){
  localStorage.setItem("cart",JSON.stringify(state.cart));
  $("cartCount").textContent=Object.values(state.cart).reduce((a,b)=>a+b,0);
}

function openCart(){
  $("cartModal").style.display="flex";
  renderCart();
}
function closeCart(){
  $("cartModal").style.display="none";
}

function renderCart(){
  const list=$("cartList"); list.innerHTML="";
  let total=0;
  for(const id in state.cart){
    const p=PRODUCTS.find(x=>x.id==id);
    const q=state.cart[id];
    total+=p.price*q;
    list.innerHTML+=`
      <div class="cartRow">
        <div>${p.name} x${q}</div>
        <div>${p.price*q} €</div>
      </div>`;
  }
  $("total").textContent="Total : "+total+" €";
}

function checkout(){
  const name=$("buyerName").value.trim();
  const phone=$("buyerPhone").value.trim();
  if(!name||!phone){alert("Nom et téléphone requis");return;}

  let lines=[], total=0;
  for(const id in state.cart){
    const p=PRODUCTS.find(x=>x.id==id);
    const q=state.cart[id];
    lines.push(`• ${p.name} x${q} (${p.price}€)`);
    total+=p.price*q;
  }

  const msg=`🧾 NOUVELLE COMMANDE

👤 Nom : ${name}
📞 Téléphone : ${phone}

📦 Produits :
${lines.join("\n")}

💰 Total : ${total} €`;

  tg.openTelegramLink(
    "https://t.me/LaBete56"+encodeURIComponent(msg)
  );

  state.cart={};
  updateCart();
  closeCart();
}

function contact(){
  tg.openTelegramLink("https://t.me/LaBete56");
}

fillFilters();
render();
</script>
</body>
</html>
