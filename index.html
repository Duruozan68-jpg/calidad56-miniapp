<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calidad56</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --gold:#d6b56d;
  --line:rgba(255,255,255,.15);
  --text:#fff;
  --panel:rgba(10,15,20,.85);
}
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
  color:var(--text);
  padding-bottom:90px;
  background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
    url("background.png");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

header{text-align:center;padding:22px 14px}
h1{margin:0;font-size:34px;letter-spacing:2px;color:var(--gold)}
.sub{opacity:.7;margin-top:6px}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:0 14px;
}

.card{
  background:var(--panel);
  border-radius:18px;
  border:1px solid var(--line);
  overflow:hidden;
}

.media{height:150px}
.media video{width:100%;height:100%;object-fit:cover}

.body{padding:10px}
.name{font-weight:900}
.farm{opacity:.7;font-size:13px}
.priceSelect{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#0f141c;
  color:#fff;
}

.add{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:12px;
  background:var(--gold);
  color:#000;
  font-weight:900;
}

nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:space-around;
  padding:10px 0;
  background:#000;
  border-top:1px solid var(--line);
}
nav button{background:none;border:none;color:#fff}

.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:flex-end;
}
.sheet{
  width:100%;
  background:#000;
  border-radius:18px 18px 0 0;
  padding:14px;
}

.cartRow{
  border-top:1px solid var(--line);
  padding:10px 0;
}
.rowTop{
  display:flex;
  justify-content:space-between;
  font-weight:900;
}
.qty{
  display:flex;
  gap:6px;
  margin-top:6px;
}
.qty button{
  width:34px;height:34px;
  border-radius:10px;
  border:1px solid var(--line);
  background:none;color:#fff;
}
.remove{
  background:none;
  border:none;
  color:#ff5c5c;
  font-size:13px;
  margin-top:6px;
}

input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#0f141c;
  color:#fff;
  margin-top:8px;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:var(--gold);
  color:#000;
  font-weight:900;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <h1>Calidad56</h1>
  <div class="sub">Mini‑app Telegram</div>
</header>

<div class="grid" id="grid"></div>

<!-- PANIER -->
<div class="modal" id="cartModal">
  <div class="sheet">
    <h3>🛒 Panier</h3>
    <div id="cartList"></div>
    <div id="total" style="margin-top:10px;font-weight:900"></div>

    <input id="buyerName" placeholder="Nom">
    <input id="buyerPhone" placeholder="Téléphone">

    <button class="btn" onclick="checkout()">Commander</button>
    <button class="btn" style="background:none;color:#fff;border:1px solid var(--line)" onclick="closeCart()">Fermer</button>
  </div>
</div>

<nav>
  <button onclick="openCart()">🛒 Panier (<span id="cartCount">0</span>)</button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const PRODUCTS = [
  {
    id:"p1",
    name:"Brides Maid",
    farm:"Calitefarm 🇺🇸",
    video:"https://www.w3schools.com/html/mov_bbb.mp4",
    prices:[
      {label:"5g", price:25},
      {label:"10g", price:45},
      {label:"25g", price:100}
    ]
  },
  {
    id:"p2",
    name:"Autumn",
    farm:"Calitefarm 🇺🇸",
    video:"https://www.w3schools.com/html/movie.mp4",
    prices:[
      {label:"5g", price:30},
      {label:"10g", price:55}
    ]
  }
];

let cart = JSON.parse(localStorage.getItem("cart")||"[]");

const $=id=>document.getElementById(id);

function render(){
  $("grid").innerHTML="";
  PRODUCTS.forEach(p=>{
    const options = p.prices.map((o,i)=>`<option value="${i}">${o.label} – ${o.price}€</option>`).join("");
    $("grid").innerHTML+=`
    <div class="card">
      <div class="media">
        <video src="${p.video}" muted autoplay loop playsinline></video>
      </div>
      <div class="body">
        <div class="name">${p.name}</div>
        <div class="farm">${p.farm}</div>
        <select class="priceSelect" id="sel-${p.id}">${options}</select>
        <button class="add" onclick="add('${p.id}')">Ajouter</button>
      </div>
    </div>`;
  });
  updateCount();
}

function add(id){
  const p = PRODUCTS.find(x=>x.id===id);
  const i = document.getElementById("sel-"+id).value;
  const priceObj = p.prices[i];

  cart.push({
    pid:id,
    name:p.name,
    label:priceObj.label,
    price:priceObj.price,
    qty:1
  });
  save();
}

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCount();
}

function updateCount(){
  $("cartCount").textContent = cart.reduce((a,b)=>a+b.qty,0);
}

function openCart(){
  $("cartModal").style.display="flex";
  renderCart();
}
function closeCart(){ $("cartModal").style.display="none"; }

function renderCart(){
  const list=$("cartList"); list.innerHTML="";
  let total=0;

  cart.forEach((c,i)=>{
    total+=c.price*c.qty;
    list.innerHTML+=`
    <div class="cartRow">
      <div class="rowTop">${c.name} (${c.label}) – ${c.price}€</div>
      <div class="qty">
        <button onclick="cQty(${i},-1)">−</button>
        <div>${c.qty}</div>
        <button onclick="cQty(${i},1)">+</button>
      </div>
      <button class="remove" onclick="removeItem(${i})">❌ Supprimer</button>
    </div>`;
  });
  $("total").textContent="Total : "+total+" €";
}

function cQty(i,n){
  cart[i].qty+=n;
  if(cart[i].qty<=0) cart.splice(i,1);
  save();renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  save();renderCart();
}

function checkout(){
  const name=$("buyerName").value;
  const phone=$("buyerPhone").value;
  if(!name||!phone){alert("Nom et téléphone requis");return;}

  let txt=`🧾 COMMANDE\n\n👤 ${name}\n📞 ${phone}\n\n📦 Produits:\n`;
  let total=0;
  cart.forEach(c=>{
    txt+=`• ${c.name} ${c.label} x${c.qty} (${c.price}€)\n`;
    total+=c.price*c.qty;
  });
  txt+=`\n💰 Total : ${total} €`;

  tg.openTelegramLink("https://t.me/share/url?text="+encodeURIComponent(txt));
  cart=[];save();closeCart();
}

render();
</script>
</body>
</html>
