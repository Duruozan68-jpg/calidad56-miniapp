<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ALLFARMZ — Mini App</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f0c;
        --bg-soft: #151513;
        --panel: #1f1f1d;
        --panel-2: #242422;
        --gold: #d8bf76;
        --gold-2: #b99a52;
        --gold-3: #8c6a2e;
        --text: #f7f5ef;
        --text-dim: #c9c6bd;
        --muted: #8e8b82;
        --accent: #3aa7ff;
        --success: #47c07b;
        --danger: #ff5c5c;
        --shadow: 0 22px 60px rgba(0, 0, 0, 0.55);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --ring: 0 0 0 1px rgba(216, 191, 118, 0.4) inset;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Cinzel", "Trajan Pro", "Georgia", serif;
        background:
          radial-gradient(60% 50% at 50% 5%, rgba(216, 191, 118, 0.15), transparent 60%),
          radial-gradient(40% 30% at 12% 0%, rgba(255, 255, 255, 0.06), transparent 60%),
          radial-gradient(40% 30% at 88% 0%, rgba(255, 255, 255, 0.06), transparent 60%),
          linear-gradient(180deg, #12120e, #0b0b09 40%, #11110e 100%);
        color: var(--text);
        min-height: 100vh;
      }

      .app {
        max-width: 860px;
        margin: 0 auto;
        padding: 20px 18px 120px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .icon-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(22, 22, 20, 0.7);
        display: grid;
        place-items: center;
        color: var(--text);
        cursor: pointer;
        transition: transform 0.15s ease, border 0.2s ease;
      }

      .icon-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(216, 191, 118, 0.6);
      }

      .brand-pill {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        border-radius: 999px;
        background: #18202c;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: var(--shadow);
      }

      .brand-logo {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: radial-gradient(circle at 30% 30%, #41f0ff, #b100ff 55%, #0b0b0b 100%);
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 12px;
        color: #fff;
        letter-spacing: 1px;
      }

      .brand-name {
        font-size: 18px;
        letter-spacing: 1px;
      }

      .hero {
        text-align: center;
        margin-bottom: 22px;
      }

      .hero-title {
        font-size: clamp(36px, 7vw, 64px);
        letter-spacing: 3px;
        color: var(--gold);
        text-shadow: 0 6px 20px rgba(216, 191, 118, 0.3);
      }

      .hero-sub {
        font-family: "Georgia", serif;
        font-size: 14px;
        color: var(--muted);
        margin-top: 6px;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin: 18px 0 10px;
      }

      .pill-select {
        padding: 14px 18px;
        border-radius: 999px;
        background: var(--bg-soft);
        border: 1px solid rgba(216, 191, 118, 0.4);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: "Georgia", serif;
        font-size: 15px;
        box-shadow: var(--ring);
      }

      .pill-select span {
        color: var(--text);
      }

      .pill-select svg {
        opacity: 0.7;
      }

      .cta {
        margin: 16px 0 30px;
      }

      .cta button {
        width: 100%;
        border: 1px solid rgba(216, 191, 118, 0.6);
        color: var(--text);
        background: linear-gradient(180deg, #1c1a13, #12110d);
        padding: 14px 18px;
        border-radius: 999px;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        box-shadow: var(--shadow);
        transition: transform 0.2s ease, border 0.2s ease;
      }

      .cta button:hover {
        transform: translateY(-2px);
        border-color: var(--gold);
      }

      .section-title {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin: 16px 0 18px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 28px;
      }

      .section-title span {
        color: var(--muted);
        font-family: "Georgia", serif;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border-radius: var(--radius-lg);
        overflow: hidden;
        border: 1px solid rgba(216, 191, 118, 0.35);
        box-shadow: var(--shadow);
      }

      .card-media {
        position: relative;
        height: 160px;
        background: linear-gradient(135deg, rgba(90, 50, 255, 0.6), rgba(30, 10, 60, 0.9));
        display: grid;
        place-items: center;
      }

      .card-media[data-tone="teal"] {
        background: linear-gradient(135deg, rgba(30, 255, 206, 0.5), rgba(10, 60, 55, 0.9));
      }

      .card-media[data-tone="gold"] {
        background: linear-gradient(135deg, rgba(255, 200, 90, 0.6), rgba(50, 30, 5, 0.9));
      }

      .play {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.55);
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .pill-tag {
        position: absolute;
        left: 12px;
        bottom: 12px;
        background: #f1f0ec;
        color: #161612;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }

      .card-body {
        padding: 14px 16px 18px;
      }

      .card-title {
        font-size: 20px;
        margin: 8px 0 8px;
      }

      .card-brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(216, 191, 118, 0.4);
        color: var(--text-dim);
        font-family: "Georgia", serif;
        font-size: 14px;
      }

      .shop-view,
      .cart-view {
        display: none;
        animation: fade 0.3s ease;
      }

      .view-active {
        display: block;
      }

      .cart-header {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 32px;
        margin: 8px 0 12px;
      }

      .back-btn {
        width: 100%;
        margin: 10px 0 20px;
        padding: 14px 16px;
        border-radius: 999px;
        border: 1px solid rgba(216, 191, 118, 0.5);
        background: #1b1a15;
        color: var(--text);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .cart-item {
        border-radius: var(--radius-lg);
        border: 1px solid rgba(216, 191, 118, 0.45);
        padding: 18px;
        background: var(--panel);
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
      }

      .cart-item h3 {
        margin: 0;
        font-size: 20px;
      }

      .cart-item p {
        margin: 6px 0 0;
        color: var(--text-dim);
        font-family: "Georgia", serif;
      }

      .qty {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #202420;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .qty button {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        color: #fff;
        font-size: 18px;
      }

      .qty .minus {
        background: #d83030;
      }

      .qty .plus {
        background: #e6c67a;
        color: #1a1508;
      }

      .qty .remove {
        background: transparent;
        color: #ff5656;
        border: 1px solid #ff5656;
      }

      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 22px 0;
      }

      .totals {
        display: grid;
        gap: 10px;
        font-size: 20px;
      }

      .totals strong {
        font-size: 28px;
      }

      .pickup {
        margin-top: 20px;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border-radius: 999px;
        border: 1px solid rgba(216, 191, 118, 0.45);
        overflow: hidden;
        background: #171611;
      }

      .segmented button {
        padding: 12px 10px;
        border: none;
        background: transparent;
        color: var(--text);
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .segmented button.active {
        background: #3f97df;
        color: #0b0b0b;
        font-weight: 700;
      }

      .form-card {
        margin-top: 18px;
        padding: 16px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(216, 191, 118, 0.35);
        background: var(--panel-2);
      }

      .form-card label {
        display: block;
        font-size: 16px;
        margin-bottom: 10px;
      }

      .input {
        width: 100%;
        border-radius: 999px;
        border: 1px solid rgba(216, 191, 118, 0.5);
        background: #14130f;
        color: var(--text);
        padding: 12px 16px;
        font-size: 15px;
      }

      .radio-group {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        margin: 10px 0 6px;
        font-family: "Georgia", serif;
      }

      .radio-group label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .primary-btn {
        width: 100%;
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #6a5a3a;
        color: #14120c;
        border: none;
        font-size: 16px;
        cursor: pointer;
      }

      .primary-btn.is-active {
        background: var(--accent);
        color: #ffffff;
      }

      .bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(16, 16, 12, 0.95);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: space-around;
        padding: 10px 12px 14px;
        backdrop-filter: blur(12px);
      }

      .nav-item {
        display: grid;
        place-items: center;
        color: var(--gold-2);
        font-size: 14px;
        gap: 6px;
      }

      .nav-item svg {
        width: 22px;
        height: 22px;
      }

      .nav-item.active {
        color: var(--gold);
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 560px) {
        .filters {
          grid-template-columns: 1fr;
        }

        .cart-item {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <button class="icon-btn" aria-label="Fermer">
          ✕
        </button>
        <div class="brand-pill">
          <div class="brand-logo">AF</div>
          <div class="brand-name">ALLFARMZ</div>
        </div>
        <button class="icon-btn" aria-label="Menu">
          •••
        </button>
      </header>

      <section class="hero">
        <div class="hero-title">ALLFARMZ</div>
        <div class="hero-sub">Qualité, terroir et sélection premium</div>
      </section>

      <main>
        <section id="shopView" class="shop-view view-active">
          <div class="filters">
            <div class="pill-select">
              <span>Toutes les catégories</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M7 10l5 5 5-5" stroke="#d8bf76" stroke-width="2" />
              </svg>
            </div>
            <div class="pill-select">
              <span>Toutes les farms</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M7 10l5 5 5-5" stroke="#d8bf76" stroke-width="2" />
              </svg>
            </div>
          </div>

          <div class="cta">
            <button id="openCartBtn" type="button">
              <span>🛒</span>
              Ouvrir le Panier
            </button>
          </div>

          <div class="section-title">
            <h2>Produits disponibles</h2>
            <span>84 résultats</span>
          </div>

          <div class="products" id="productGrid"></div>
        </section>

        <section id="cartView" class="cart-view">
          <div class="cart-header">🛒 Mon Panier</div>
          <button class="back-btn" id="backToShop" type="button">← Retour à la Boutique</button>

          <div class="cart-item">
            <div>
              <h3>Lemon cherry gelato</h3>
              <p>10g à 350.00 €</p>
              <p><strong>Total: 350.00 €</strong></p>
            </div>
            <div class="qty">
              <button class="minus" type="button">−</button>
              <strong>1</strong>
              <button class="plus" type="button">+</button>
              <button class="remove" type="button">×</button>
            </div>
          </div>

          <div class="divider"></div>

          <div class="totals">
            <div>Total Articles: <strong style="float:right">1</strong></div>
            <div>Total à payer: <strong style="float:right; color: var(--gold)">350.00 €</strong></div>
          </div>

          <div class="pickup">
            <h3>Type de retrait</h3>
            <div class="segmented" id="pickupTabs">
              <button class="active" data-type="meetup">Meetup</button>
              <button data-type="delivery">Livraison</button>
              <button data-type="parcel">Colis</button>
            </div>

            <div class="form-card" id="pickupForm">
              <label for="addressInput">Détails de la Livraison</label>
              <input
                class="input"
                id="addressInput"
                placeholder="Entrez votre adresse de livraison complète"
                disabled
              />
              <div class="radio-group">
                <label><input type="radio" name="housing" disabled /> Maison</label>
                <label><input type="radio" name="housing" disabled /> Appartement</label>
                <label><input type="radio" name="housing" disabled /> Hotel</label>
              </div>
              <button class="primary-btn" id="primaryAction" type="button">
                Veuillez choisir un type de retrait
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <nav class="bottom-nav">
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 10l8-6 8 6v8a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1v-8z" stroke="currentColor" stroke-width="1.6" />
        </svg>
        Menu
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 17h.01M10.5 9a1.5 1.5 0 0 1 3 0c0 1.5-1.5 1.5-1.5 3" stroke="currentColor" stroke-width="1.6" />
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" />
        </svg>
        FAQ
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.6" />
          <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.6" />
        </svg>
        Contact
      </div>
    </nav>

    <script>
      const productData = [
        { name: "Brides maid", farm: "Calitefarm", tone: "gold" },
        { name: "Autum", farm: "Calitefarm", tone: "violet" },
        { name: "Ocean mint", farm: "Greenline", tone: "teal" },
        { name: "Velvet haze", farm: "Sunset", tone: "violet" }
      ];

      const grid = document.getElementById("productGrid");
      const tones = { violet: "", teal: "teal", gold: "gold" };
      productData.forEach((item, index) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-media" data-tone="${tones[item.tone] || ""}">
            <div class="play">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M8 6l10 6-10 6V6z" fill="#fff"/>
              </svg>
            </div>
            <div class="pill-tag">Static us 🇺🇸</div>
          </div>
          <div class="card-body">
            <div class="card-title">${item.name}</div>
            <div class="card-brand">🌾 ${item.farm} 🇺🇸</div>
          </div>
        `;
        grid.appendChild(card);
      });

      const shopView = document.getElementById("shopView");
      const cartView = document.getElementById("cartView");
      const openCartBtn = document.getElementById("openCartBtn");
      const backToShop = document.getElementById("backToShop");

      openCartBtn.addEventListener("click", () => {
        shopView.classList.remove("view-active");
        cartView.classList.add("view-active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      backToShop.addEventListener("click", () => {
        cartView.classList.remove("view-active");
        shopView.classList.add("view-active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      const tabs = document.querySelectorAll("#pickupTabs button");
      const addressInput = document.getElementById("addressInput");
      const primaryAction = document.getElementById("primaryAction");
      const radios = document.querySelectorAll('input[name="housing"]');

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((btn) => btn.classList.remove("active"));
          tab.classList.add("active");
          const type = tab.dataset.type;

          if (type === "meetup") {
            addressInput.disabled = true;
            radios.forEach((r) => (r.disabled = true));
            primaryAction.textContent = "Commander par Telegram (Meetup)";
            primaryAction.classList.add("is-active");
          }

          if (type === "delivery") {
            addressInput.disabled = false;
            radios.forEach((r) => (r.disabled = false));
            primaryAction.textContent = "Valider l'adresse de livraison";
            primaryAction.classList.add("is-active");
          }

          if (type === "parcel") {
            addressInput.disabled = false;
            radios.forEach((r) => (r.disabled = false));
            primaryAction.textContent = "Finaliser l'envoi par Colis";
            primaryAction.classList.add("is-active");
          }
        });
      });
    </script>
  </body>
</html>
