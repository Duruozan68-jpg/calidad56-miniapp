<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Calidad Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0b0b;
      --card: rgba(18, 18, 18, 0.78);
      --card-strong: rgba(12, 12, 12, 0.92);
      --gold: #c9a45c;
      --gold-2: #a9853a;
      --text: #f7f4ee;
      --muted: #b9b2a1;
      --accent: #3a8fff;
      --danger: #df3b3b;
      --success: #4cb77b;
      --shadow: 0 14px 40px rgba(0,0,0,0.35);
      --radius: 20px;
      --bg-image: url("background.png?v=5");
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Manrope", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 70% 10%, rgba(201,164,92,0.15), transparent 60%),
        radial-gradient(900px 600px at 10% 20%, rgba(201,164,92,0.08), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,0.84), rgba(0,0,0,0.95)),
        var(--bg-image) center/cover fixed no-repeat;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      padding: 20px 16px 100px;
      backdrop-filter: blur(2px);
      animation: appFade 0.8s ease;
    }

    @keyframes appFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-top: 6px;
      margin-bottom: 16px;
    }

    .brand {
      font-family: "Cinzel", serif;
      letter-spacing: 2px;
      font-size: 34px;
      margin: 0;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .section {
      background: var(--card);
      border: 1px solid rgba(201,164,92,0.35);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      margin-bottom: 18px;
    }

    .section-title {
      font-family: "Cinzel", serif;
      font-size: 22px;
      margin: 0 0 8px;
    }

    .subtle-line {
      height: 2px;
      width: 40px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 8px auto 0;
      border-radius: 999px;
      opacity: 0.8;
    }

    .divider {
      height: 1px;
      background: rgba(201,164,92,0.35);
      margin: 16px 0;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 12px;
    }

    .input, .select, .textarea {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(201,164,92,0.35);
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      outline: none;
    }

    .textarea { min-height: 90px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card-strong);
      border-radius: 16px;
      border: 1px solid rgba(201,164,92,0.4);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: floatIn 0.5s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.4);
    }

    .card.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .media {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .media-wrap {
      position: relative;
    }

    .play-icon {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      color: rgba(255,255,255,0.8);
      font-size: 28px;
      text-shadow: 0 0 12px rgba(0,0,0,0.6);
    }

    .card-body {
      padding: 10px 12px 14px;
    }

    .card-title {
      font-weight: 700;
      margin: 0 0 6px;
      font-size: 16px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      border: 1px solid rgba(201,164,92,0.5);
      color: var(--gold);
      font-size: 12px;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(201,164,92,0.5);
      color: var(--gold);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10,10,10,0.9);
      border-top: 1px solid rgba(201,164,92,0.3);
      padding: 8px 14px calc(8px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      backdrop-filter: blur(10px);
      z-index: 50;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--gold);
      font-size: 12px;
      text-decoration: none;
      padding: 8px 0;
      border-radius: 14px;
    }

    .nav-btn.active {
      background: rgba(201,164,92,0.15);
      color: #fff;
    }

    .nav-icon { font-size: 20px; }

    .btn {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(201,164,92,0.5);
      background: linear-gradient(180deg, rgba(201,164,92,0.25), rgba(201,164,92,0.1));
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: linear-gradient(135deg, #2ea8ff, #3a8fff);
      border: none;
      color: #fff;
    }

    .btn-danger {
      background: rgba(223, 59, 59, 0.15);
      border: 1px solid rgba(223, 59, 59, 0.5);
      color: #ffb3b3;
    }

    .btn-gold {
      background: linear-gradient(135deg, #c9a45c, #a9853a);
      color: #1a1a1a;
      border: none;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .muted { color: var(--muted); }

    .cart-item {
      border: 1px solid rgba(201,164,92,0.35);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(16,16,16,0.6);
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 999px;
      padding: 4px 8px;
      border: 1px solid rgba(201,164,92,0.3);
    }

    .qty button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    .qty .minus { background: #9b1f1f; color: #fff; }
    .qty .plus { background: #c9a45c; color: #1a1a1a; }

    .segmented {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .seg-btn {
      flex: 1;
      padding: 12px;
      border-radius: 999px;
      border: 1px solid rgba(201,164,92,0.5);
      background: rgba(0,0,0,0.3);
      color: #fff;
      cursor: pointer;
    }

    .seg-btn.active {
      background: linear-gradient(135deg, #c9a45c, #a9853a);
      color: #1a1a1a;
      border: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 18px;
    }

    .modal.active { display: flex; }

    .modal-card {
      width: 100%;
      max-width: 520px;
      background: var(--card-strong);
      border-radius: 22px;
      border: 1px solid rgba(201,164,92,0.4);
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(201,164,92,0.7);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 2;
      font-weight: 700;
    }

    .modal-body { padding: 16px; }

    .price-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .price-option {
      border: 1px solid rgba(201,164,92,0.5);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .price-option.active {
      background: rgba(201,164,92,0.2);
      color: #fff;
    }

    .admin-panel {
      margin-top: 10px;
      border: 1px dashed rgba(201,164,92,0.4);
      border-radius: 16px;
      padding: 12px;
    }

    .admin-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .admin-item {
      padding: 10px;
      border: 1px solid rgba(201,164,92,0.3);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10,10,10,0.5);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(201,164,92,0.5);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 200;
    }

    .toast.show { opacity: 1; }

    @media (max-width: 420px) {
      .brand { font-size: 28px; }
      .grid { grid-template-columns: 1fr 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="brand">Calidad</h1>
      <div class="brand-sub">Sélection premium</div>
      <div class="subtle-line"></div>
    </header>

    <main>
      <section id="menu-view" class="view active">
        <div class="section">
          <h2 class="section-title">Produits disponibles</h2>

          <div class="toolbar">
            <input id="search" class="input" placeholder="Rechercher un produit..." />
            <select id="sort" class="select">
              <option value="featured">Trier</option>
              <option value="price-asc">Prix ↑</option>
              <option value="price-desc">Prix ↓</option>
              <option value="name">Nom A‑Z</option>
            </select>
          </div>

          <div class="grid" id="product-grid"></div>
          <div id="empty-products" class="muted" style="display:none; margin-top:10px;">Aucun produit trouvé.</div>
        </div>
      </section>

      <section id="cart-view" class="view">
        <div class="section">
          <h2 class="section-title">Mon panier</h2>
          <div id="cart-list"></div>
          <div class="divider"></div>
          <div class="between">
            <div class="muted">Total Articles</div>
            <div id="total-items">0</div>
          </div>
          <div class="between" style="margin-top:6px;">
            <div class="section-title" style="font-size:20px;">Total à payer</div>
            <div class="section-title" id="total-price">0 €</div>
          </div>

          <div class="divider"></div>
          <div class="section-title" style="font-size:18px;">Type de retrait</div>
          <div class="segmented">
            <button class="seg-btn" data-pickup="Meetup">Meetup</button>
            <button class="seg-btn" data-pickup="Livraison">Livraison</button>
          </div>

          <div id="meetup-action" style="margin-top:12px; display:none;">
            <button class="btn btn-primary" id="meetup-order">Commander via Telegram (Meetup)</button>
          </div>

          <div id="delivery-form" style="margin-top:12px; display:none;">
            <div class="section-title" style="font-size:16px;">Détails de la livraison</div>
            <input id="delivery-address" class="input" placeholder="Entrez votre adresse de livraison complète" />
            <div class="row" style="margin-top:10px;">
              <label class="chip"><input type="radio" name="housing" value="Maison" /> Maison</label>
              <label class="chip"><input type="radio" name="housing" value="Appartement" /> Appartement</label>
              <label class="chip"><input type="radio" name="housing" value="Hôtel" /> Hôtel</label>
            </div>
            <button class="btn btn-primary" id="delivery-order" style="margin-top:12px;">Commander via Telegram (Livraison)</button>
          </div>
        </div>
      </section>

      <section id="account-view" class="view">
        <div class="section">
          <h2 class="section-title">Mon compte</h2>
          <div class="muted">Historique local des commandes</div>
          <div id="order-history" class="admin-list"></div>

          <div class="divider"></div>
          <button id="open-admin" class="btn btn-gold">Accéder à l’admin</button>

          <div id="admin-panel" class="admin-panel" style="display:none;">
            <div class="section-title" style="font-size:16px;">Admin panel</div>
            <div class="muted" id="admin-status">Non connecté</div>

            <div class="divider"></div>
            <input id="admin-code" class="input" placeholder="Code admin (2810)" />
            <button id="admin-unlock" class="btn">Déverrouiller</button>

            <div id="admin-auth" style="margin-top:10px; display:none;">
              <input id="admin-email" class="input" placeholder="Email admin" />
              <input id="admin-password" class="input" type="password" placeholder="Mot de passe admin" style="margin-top:8px;" />
              <div class="row" style="margin-top:8px;">
                <button id="admin-login" class="btn btn-primary">Connexion</button>
                <button id="admin-logout" class="btn btn-danger">Déconnexion</button>
              </div>
            </div>

            <div id="admin-form-wrap" style="margin-top:14px; display:none;">
              <div class="section-title" style="font-size:15px;">Nouveau produit / Modifier</div>
              <input id="p-name" class="input" placeholder="Nom du produit" />
              <textarea id="p-desc" class="textarea" placeholder="Description"></textarea>

              <div class="row">
                <select id="p-media-type" class="select">
                  <option value="image">Image</option>
                  <option value="video">Vidéo</option>
                </select>
                <input id="p-media-url" class="input" placeholder="URL média (ex: assets/bridesmaid.mp4)" />
              </div>
              <input id="p-poster" class="input" placeholder="Poster vidéo (optionnel)" />
              <input id="p-origin" class="input" placeholder="Origine (ex: USA)" />
              <input id="p-category" class="input" placeholder="Catégorie (optionnel)" />
              <input id="p-badge" class="input" placeholder="Badge (ex: Static US)" />
              <div class="row">
                <input id="p-stock" class="input" placeholder="Stock (optionnel)" />
                <input id="p-priority" class="input" placeholder="Priorité (ex: 10)" />
              </div>
              <div class="row">
                <label class="toggle"><input id="p-active" type="checkbox" checked /> Actif</label>
                <label class="toggle"><input id="p-featured" type="checkbox" /> Mis en avant</label>
              </div>

              <div class="row">
                <input id="p-1g" class="input" placeholder="Prix 1g (EUR)" />
                <input id="p-5g" class="input" placeholder="Prix 5g (EUR)" />
              </div>
              <div class="row">
                <input id="p-10g" class="input" placeholder="Prix 10g (EUR)" />
                <input id="p-50g" class="input" placeholder="Prix 50g (EUR)" />
              </div>

              <div class="row" style="margin-top:10px;">
                <button id="p-save" class="btn btn-gold">Enregistrer</button>
                <button id="p-cancel" class="btn">Annuler</button>
              </div>

              <button id="seed-products" class="btn" style="margin-top:10px;">Initialiser 4 produits</button>

              <div class="admin-list" id="admin-list"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav">
    <a class="nav-btn" id="nav-cart"><span class="nav-icon">🛒</span>Panier</a>
    <a class="nav-btn active" id="nav-menu"><span class="nav-icon">🏠</span>Menu</a>
    <a class="nav-btn" id="nav-account"><span class="nav-icon">👤</span>Compte</a>
  </nav>

  <div class="modal" id="product-modal">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-media"></div>
      <div class="modal-body">
        <h3 id="modal-title"></h3>
        <div class="muted" id="modal-desc"></div>
        <div class="muted" id="modal-stock" style="margin-top:6px;"></div>

        <div style="margin-top:12px;">
          <div class="section-title" style="font-size:16px;">Prix</div>
          <div class="price-grid" id="modal-prices"></div>
        </div>

        <div style="margin-top:12px;" class="row between">
          <div class="muted">Quantité</div>
          <div class="qty">
            <button class="minus" id="qty-minus">-</button>
            <span id="qty-value">1</span>
            <button class="plus" id="qty-plus">+</button>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <button class="btn btn-gold" id="add-to-cart">Ajouter au panier</button>
          <button class="btn" id="go-cart">Voir panier</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

          { label: "5g", price: 170 },
          { label: "10g", price: 320 },
          { label: "50g", price: 1300 }
        ]
      },
      {
        name: "Lemon Cherry Gelato",
        description: "Sucré, fruité, très propre.",
        mediaType: "image",
        mediaUrl: "background.png",
        poster: "background.png",
        origin: "USA",
        category: "Premium",
        badge: "Premium",
        featured: true,
        active: true,
        priority: 9,
        prices: [
          { label: "1g", price: 40 },
          { label: "5g", price: 200 },
          { label: "10g", price: 350 },
          { label: "50g", price: 1450 }
        ]
      }
    ];

    const $ = (id) => document.getElementById(id);

    function toast(msg) {
      const el = $("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2200);
    }

    function formatPrice(v) {
      return `${Number(v || 0).toFixed(0)} €`;
    }

    function saveCart() {
      localStorage.setItem("calidad_cart", JSON.stringify(state.cart));
    }

    function setActiveView(id) {
      ["menu-view","cart-view","account-view"].forEach(v => $(v).classList.remove("active"));
      $(id).classList.add("active");
      ["nav-menu","nav-cart","nav-account"].forEach(n => $(n).classList.remove("active"));
      if (id === "menu-view") $("nav-menu").classList.add("active");
      if (id === "cart-view") $("nav-cart").classList.add("active");
      if (id === "account-view") $("nav-account").classList.add("active");
    }

    function resolveUrl(path) {
      try { return new URL(path, window.location.href).href; } catch { return path; }
    }

    function createMedia(product, mode = "card") {
      const wrap = document.createElement("div");
      wrap.className = "media-wrap";
      const type = product.mediaType || "image";

      if (type === "video") {
        const video = document.createElement("video");
        video.className = "media";
        video.poster = product.poster || "background.png";
        video.playsInline = true;
        video.muted = mode === "card";
        video.loop = mode === "card";
        video.autoplay = mode === "card";
        video.preload = "metadata";
        if (mode === "modal") video.controls = true;

        const source = document.createElement("source");
        source.src = resolveUrl(product.mediaUrl || "");
        source.type = "video/mp4";
        video.appendChild(source);

        wrap.appendChild(video);

        if (mode === "card") {
          const icon = document.createElement("div");
          icon.className = "play-icon";
          icon.textContent = "▶";
          wrap.appendChild(icon);
        }
      } else {
        const img = document.createElement("img");
        img.className = "media";
        img.src = resolveUrl(product.mediaUrl || "background.png");
        img.loading = "lazy";
        wrap.appendChild(img);
      }

      return wrap;
    }

    function minPrice(product) {
      const prices = product.prices || [];
      if (!prices.length) return 0;
      return Math.min(...prices.map(p => Number(p.price) || 0));
    }

    function getVisibleProducts() {
      const search = $("search").value.trim().toLowerCase();
      const sort = $("sort").value;

      let list = state.products.filter(p => p.active !== false);

      if (search) {
        list = list.filter(p =>
          (p.name || "").toLowerCase().includes(search) ||
          (p.category || "").toLowerCase().includes(search) ||
          (p.badge || "").toLowerCase().includes(search)
        );
      }

      if (sort === "price-asc") {
        list.sort((a,b) => minPrice(a) - minPrice(b));
      } else if (sort === "price-desc") {
        list.sort((a,b) => minPrice(b) - minPrice(a));
      } else if (sort === "name") {
        list.sort((a,b) => (a.name || "").localeCompare(b.name || ""));
      } else {
        list.sort((a,b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0) || (b.priority || 0) - (a.priority || 0));
      }

      return list;
    }

    function renderProducts() {
      const grid = $("product-grid");
      grid.innerHTML = "";
      const products = getVisibleProducts();
      $("empty-products").style.display = products.length ? "none" : "block";

      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        if (p.stock === 0) card.classList.add("disabled");

        card.appendChild(createMedia(p, "card"));

        if (p.badge) {
          const badge = document.createElement("div");
          badge.className = "badge";
          badge.textContent = p.badge;
          card.appendChild(badge);
        }

        const body = document.createElement("div");
        body.className = "card-body";

        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = p.name || "Produit";

        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = p.origin || "Premium";

        body.appendChild(title);
        body.appendChild(chip);

        card.appendChild(body);

        card.addEventListener("click", () => openProductModal(p));
        grid.appendChild(card);
      });
    }

    function openProductModal(product) {
      state.selectedProduct = product;
      state.selectedOptionIndex = 0;
      state.qty = 1;

      $("modal-title").textContent = product.name || "";
      $("modal-desc").textContent = product.description || "";
      $("modal-stock").textContent = product.stock === 0 ? "Rupture de stock" : "";

      const media = $("modal-media");
      media.innerHTML = "";
      media.appendChild(createMedia(product, "modal"));

      const priceGrid = $("modal-prices");
      priceGrid.innerHTML = "";
      (product.prices || []).forEach((opt, idx) => {
        const btn = document.createElement("div");
        btn.className = "price-option" + (idx === 0 ? " active" : "");
        btn.textContent = `${opt.label} - ${formatPrice(opt.price)}`;
        btn.addEventListener("click", () => {
          state.selectedOptionIndex = idx;
          [...priceGrid.children].forEach(c => c.classList.remove("active"));
          btn.classList.add("active");
        });
        priceGrid.appendChild(btn);
      });

      $("qty-value").textContent = state.qty;
      $("product-modal").classList.add("active");
    }

    function closeModal() {
      $("product-modal").classList.remove("active");
    }

    function addToCart() {
      const p = state.selectedProduct;
      if (!p) return;

      if (p.stock === 0) {
        toast("Rupture de stock");
        return;
      }

      const opt = (p.prices || [])[state.selectedOptionIndex];
      if (!opt) return;

      const maxStock = Number(p.stock);
      if (!Number.isNaN(maxStock) && maxStock > 0 && state.qty > maxStock) {
        state.qty = maxStock;
      }

      const key = `${p.id}_${opt.label}`;
      const existing = state.cart.find(i => i.key === key);
      if (existing) existing.qty += state.qty;
      else state.cart.push({
        key,
        productId: p.id,
        name: p.name,
        optionLabel: opt.label,
        unitPrice: opt.price,
        qty: state.qty
      });

      saveCart();
      renderCart();
      toast("Ajouté au panier");
    }

    function renderCart() {
      const list = $("cart-list");
      list.innerHTML = "";
      let totalItems = 0;
      let totalPrice = 0;

      state.cart.forEach(item => {
        totalItems += item.qty;
        totalPrice += item.qty * item.unitPrice;

        const row = document.createElement("div");
        row.className = "cart-item";

        const top = document.createElement("div");
        top.className = "between";

        const left = document.createElement("div");
        const name = document.createElement("strong");
        name.textContent = item.name;
        const meta = document.createElement("div");
        meta.className = "muted";
        meta.textContent = `${item.optionLabel} • ${formatPrice(item.unitPrice)}`;
        left.appendChild(name);
        left.appendChild(meta);

        const del = document.createElement("button");
        del.className = "btn btn-danger";
        del.textContent = "Supprimer";
        del.dataset.remove = item.key;

        top.appendChild(left);
        top.appendChild(del);

        const total = document.createElement("div");
        total.className = "between";
        total.style.marginTop = "10px";
        total.innerHTML = `<div class="muted">Total</div><div>${formatPrice(item.qty * item.unitPrice)}</div>`;

        const qty = document.createElement("div");
        qty.className = "qty";
        qty.style.marginTop = "10px";
        qty.innerHTML = `
          <button class="minus" data-minus="${item.key}">-</button>
          <span>${item.qty}</span>
          <button class="plus" data-plus="${item.key}">+</button>
        `;

        row.appendChild(top);
        row.appendChild(total);
        row.appendChild(qty);
        list.appendChild(row);
      });

      $("total-items").textContent = totalItems;
      $("total-price").textContent = formatPrice(totalPrice);
    }

    function updateCartQty(key, delta) {
      const item = state.cart.find(i => i.key === key);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) state.cart = state.cart.filter(i => i.key !== key);
      saveCart();
      renderCart();
    }

    function removeFromCart(key) {
      state.cart = state.cart.filter(i => i.key !== key);
      saveCart();
      renderCart();
    }

    function buildOrderMessage(type) {
      const lines = [];
      lines.push("Calidad Shop - Nouvelle commande");
      lines.push(`Type de retrait: ${type}`);
      if (type === "Livraison") {
        const address = $("delivery-address").value.trim();
        const housing = document.querySelector("input[name='housing']:checked")?.value || "";
        lines.push(`Adresse: ${address || "Non renseignée"}`);
        lines.push(`Logement: ${housing || "Non renseigné"}`);
      }
      lines.push("");
      lines.push("Articles:");
      state.cart.forEach((item, idx) => {
        lines.push(`${idx + 1}) ${item.name} - ${item.optionLabel} x${item.qty} = ${formatPrice(item.qty * item.unitPrice)}`);
      });
      const totalItems = state.cart.reduce((s,i) => s + i.qty, 0);
      const totalPrice = state.cart.reduce((s,i) => s + i.qty * i.unitPrice, 0);
      lines.push("");
      lines.push(`Total articles: ${totalItems}`);
      lines.push(`Total à payer: ${formatPrice(totalPrice)}`);
      return lines.join("\\n");
    }

    function openSecretary(message) {
      if (!message || !state.cart.length) {
        toast("Panier vide");
        return;
      }
      const url = `${SECRETARY_URL}?text=${encodeURIComponent(message)}`;

      if (window.Telegram?.WebApp?.openTelegramLink) {
        window.Telegram.WebApp.openTelegramLink(url);
      } else if (window.Telegram?.WebApp?.openLink) {
        window.Telegram.WebApp.openLink(url);
      } else {
        window.open(url, "_blank");
      }

      if (navigator.clipboard) {
        navigator.clipboard.writeText(message).then(() => {
          toast("Message copié");
        }).catch(() => {});
      }

      saveOrderHistory(message);
    }

    function saveOrderHistory(message) {
      const history = JSON.parse(localStorage.getItem("calidad_orders") || "[]");
      history.unshift({ message, date: new Date().toISOString() });
      localStorage.setItem("calidad_orders", JSON.stringify(history.slice(0, 30)));
      renderOrderHistory();
    }

    function renderOrderHistory() {
      const history = JSON.parse(localStorage.getItem("calidad_orders") || "[]");
      const container = $("order-history");
      container.innerHTML = "";
      history.forEach(h => {
        const item = document.createElement("div");
        item.className = "admin-item";
        item.innerHTML = `
          <div>
            <div><strong>${new Date(h.date).toLocaleString()}</strong></div>
            <div class="muted" style="font-size:12px;">${h.message.split("\\n")[0]}</div>
          </div>
        `;
        container.appendChild(item);
      });
      if (!history.length) {
        container.innerHTML = `<div class="muted">Aucune commande enregistrée.</div>`;
      }
    }

    function renderAdminList() {
      const list = $("admin-list");
      list.innerHTML = "";
      state.products.forEach(p => {
        const item = document.createElement("div");
        item.className = "admin-item";
        item.innerHTML = `
          <div>
            <strong>${p.name}</strong>
            <div class="muted" style="font-size:12px;">${p.mediaType || "image"} • ${p.active === false ? "Inactif" : "Actif"}</div>
          </div>
          <div class="row">
            <button class="btn" data-edit="${p.id}">Modifier</button>
            <button class="btn btn-danger" data-del="${p.id}">Supprimer</button>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function getPriceInputs() {
      const prices = [];
      const p1 = Number($("p-1g").value);
      const p5 = Number($("p-5g").value);
      const p10 = Number($("p-10g").value);
      const p50 = Number($("p-50g").value);
      if (p1) prices.push({ label: "1g", price: p1 });
      if (p5) prices.push({ label: "5g", price: p5 });
      if (p10) prices.push({ label: "10g", price: p10 });
      if (p50) prices.push({ label: "50g", price: p50 });
      return prices;
    }

    async function saveProduct() {
      if (!state.adminAuthorized) return toast("Admin non autorisé");
      const name = $("p-name").value.trim();
      if (!name) return toast("Nom requis");

      const product = {
        name,
        description: $("p-desc").value.trim(),
        mediaType: $("p-media-type").value,
        mediaUrl: $("p-media-url").value.trim() || "background.png",
        poster: $("p-poster").value.trim() || "background.png",
        origin: $("p-origin").value.trim(),
        category: $("p-category").value.trim(),
        badge: $("p-badge").value.trim(),
        stock: $("p-stock").value.trim() ? Number($("p-stock").value.trim()) : null,
        priority: $("p-priority").value.trim() ? Number($("p-priority").value.trim()) : 0,
        active: $("p-active").checked,
        featured: $("p-featured").checked,
        prices: getPriceInputs(),
        updatedAt: Date.now()
      };

      if (state.editingId) {
        await update(ref(db, "products/" + state.editingId), product);
        toast("Produit modifié");
      } else {
        const newRef = push(ref(db, "products"));
        await set(newRef, { ...product, createdAt: Date.now() });
        toast("Produit ajouté");
      }

      clearAdminForm();
    }

    function clearAdminForm() {
      state.editingId = null;
      ["p-name","p-desc","p-media-url","p-poster","p-origin","p-category","p-badge","p-stock","p-priority","p-1g","p-5g","p-10g","p-50g"].forEach(id => $(id).value = "");
      $("p-active").checked = true;
      $("p-featured").checked = false;
    }

    async function deleteProduct(id) {
      if (!state.adminAuthorized) return toast("Admin non autorisé");
      await remove(ref(db, "products/" + id));
      toast("Produit supprimé");
    }

    async function seedDefaults() {
      if (!state.adminAuthorized) return toast("Admin non autorisé");
      if (!confirm("Ajouter les 4 produits par défaut ?")) return;
      for (const p of DEFAULT_PRODUCTS) {
        const newRef = push(ref(db, "products"));
        await set(newRef, { ...p, createdAt: Date.now() });
      }
      toast("Produits initiaux ajoutés");
    }

    // Firebase live sync
    onValue(ref(db, "products"), (snapshot) => {
      const data = snapshot.val() || {};
      state.products = Object.entries(data).map(([id, val]) => ({ id, ...val }));
      renderProducts();
      renderAdminList();
    });

    onAuthStateChanged(auth, (user) => {
      state.adminAuthorized = !!user && user.uid === ADMIN_UID;
      $("admin-status").textContent = state.adminAuthorized ? "Connecté en admin" : "Non connecté";
      $("admin-form-wrap").style.display = (state.adminUnlocked && state.adminAuthorized) ? "block" : "none";
    });

    // Navigation
    $("nav-menu").addEventListener("click", () => setActiveView("menu-view"));
    $("nav-cart").addEventListener("click", () => { setActiveView("cart-view"); renderCart(); });
    $("nav-account").addEventListener("click", () => { setActiveView("account-view"); renderOrderHistory(); });

    // Modal
    $("modal-close").addEventListener("click", closeModal);
    $("add-to-cart").addEventListener("click", () => { addToCart(); closeModal(); });
    $("go-cart").addEventListener("click", () => { closeModal(); setActiveView("cart-view"); renderCart(); });
    $("qty-minus").addEventListener("click", () => { if (state.qty > 1) state.qty--; $("qty-value").textContent = state.qty; });
    $("qty-plus").addEventListener("click", () => { state.qty++; $("qty-value").textContent = state.qty; });

    // Cart actions
    $("cart-list").addEventListener("click", (e) => {
      const minus = e.target.dataset.minus;
      const plus = e.target.dataset.plus;
      const del = e.target.dataset.remove;
      if (minus) updateCartQty(minus, -1);
      if (plus) updateCartQty(plus, 1);
      if (del) removeFromCart(del);
    });

    // Pickup
    document.querySelectorAll(".seg-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".seg-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const type = btn.dataset.pickup;
        state.pickupType = type;
        if (type === "Meetup") {
          $("meetup-action").style.display = "block";
          $("delivery-form").style.display = "none";
        } else {
          $("meetup-action").style.display = "none";
          $("delivery-form").style.display = "block";
        }
      });
    });

    $("meetup-order").addEventListener("click", () => {
      openSecretary(buildOrderMessage("Meetup"));
    });

    $("delivery-order").addEventListener("click", () => {
      const address = $("delivery-address").value.trim();
      const housing = document.querySelector("input[name='housing']:checked");
      if (!address || !housing) return toast("Adresse + logement requis");
      openSecretary(buildOrderMessage("Livraison"));
    });

    // Admin panel
    $("open-admin").addEventListener("click", () => {
      const panel = $("admin-panel");
      panel.style.display = panel.style.display === "none" ? "block" : "none";
    });

    $("admin-unlock").addEventListener("click", () => {
      const code = $("admin-code").value.trim();
      if (code === ADMIN_CODE) {
        state.adminUnlocked = true;
        $("admin-auth").style.display = "block";
        $("admin-status").textContent = "Code accepté, connecte-toi";
        toast("Code valide");
      } else {
        toast("Code incorrect");
      }
    });

    $("admin-login").addEventListener("click", async () => {
      const email = $("admin-email").value.trim();
      const pass = $("admin-password").value.trim();
      if (!email || !pass) return toast("Email + mot de passe requis");
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        toast("Connecté");
      } catch (err) {
        toast("Erreur de connexion");
      }
    });

    $("admin-logout").addEventListener("click", async () => {
      await signOut(auth);
      toast("Déconnecté");
    });

    $("p-save").addEventListener("click", saveProduct);
    $("p-cancel").addEventListener("click", clearAdminForm);
    $("seed-products").addEventListener("click", seedDefaults);

    $("admin-list").addEventListener("click", (e) => {
      const editId = e.target.dataset.edit;
      const delId = e.target.dataset.del;
      if (editId) {
        const p = state.products.find(x => x.id === editId);
        if (!p) return;
        state.editingId = editId;
        $("p-name").value = p.name || "";
        $("p-desc").value = p.description || "";
        $("p-media-type").value = p.mediaType || "image";
        $("p-media-url").value = p.mediaUrl || "";
        $("p-poster").value = p.poster || "";
        $("p-origin").value = p.origin || "";
        $("p-category").value = p.category || "";
        $("p-badge").value = p.badge || "";
        $("p-stock").value = p.stock ?? "";
        $("p-priority").value = p.priority ?? "";
        $("p-active").checked = p.active !== false;
        $("p-featured").checked = !!p.featured;
        const prices = p.prices || [];
        $("p-1g").value = prices.find(x => x.label === "1g")?.price || "";
        $("p-5g").value = prices.find(x => x.label === "5g")?.price || "";
        $("p-10g").value = prices.find(x => x.label === "10g")?.price || "";
        $("p-50g").value = prices.find(x => x.label === "50g")?.price || "";
      }
      if (delId) deleteProduct(delId);
    });

    // Search + sort
    $("search").addEventListener("input", renderProducts);
    $("sort").addEventListener("change", renderProducts);

    // Telegram WebApp polish
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      if (tg.setHeaderColor) tg.setHeaderColor("#0b0b0b");
      if (tg.setBackgroundColor) tg.setBackgroundColor("#0b0b0b");
    }

    renderProducts();
    renderCart();
    renderOrderHistory();
  </script>
</body>
</html>
