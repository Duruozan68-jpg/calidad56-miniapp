<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALIDAD • STREET SHOP</title>

<!-- Telegram -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* =========================
   THEME — STREET / NEON
========================= */
:root{
  --bg:#050508;
  --panel:#0b0b12;
  --glass:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.12);
  --text:#f5f7ff;
  --muted:#9aa0b4;
  --neon:#22ff88;
  --neon2:#00d9ff;
  --danger:#ff3355;
  --shadow:0 25px 80px rgba(0,0,0,.8);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  color:var(--text);
  background:
    radial-gradient(800px 400px at 10% 0%, rgba(34,255,136,.15), transparent 60%),
    radial-gradient(700px 400px at 90% 10%, rgba(0,217,255,.15), transparent 60%),
    linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
    url("./assets/background.png") center/cover fixed;
}

/* =========================
   LAYOUT
========================= */
header{
  position:sticky; top:0; z-index:10;
  padding:14px;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
header h1{
  margin:0;
  font-size:22px;
  letter-spacing:1px;
}
header span{color:var(--neon)}

#grid{
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;
}

/* =========================
   PRODUCT CARD
========================= */
.card{
  background:var(--glass);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:.25s;
}
.card:hover{
  transform:translateY(-4px) scale(1.01);
  border-color:var(--neon);
}
.card h3{margin:8px 0 4px}
.card p{
  margin:0;
  font-size:13px;
  color:var(--muted);
}
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  background:rgba(34,255,136,.15);
  border:1px solid rgba(34,255,136,.4);
}

/* =========================
   BOTTOM BAR
========================= */
#bar{
  position:fixed;
  bottom:0; left:0; right:0;
  background:rgba(0,0,0,.85);
  border-top:1px solid var(--line);
  backdrop-filter:blur(16px);
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
#bar b{color:var(--neon)}
.btn{
  padding:12px 16px;
  border-radius:14px;
  border:none;
  font-weight:900;
  cursor:pointer;
}
.btn.primary{
  background:linear-gradient(180deg,var(--neon),#18cc6c);
}
.btn.danger{
  background:linear-gradient(180deg,#ff5577,#ff3355);
  color:white;
}

/* =========================
   MODAL
========================= */
.modal{
  position:fixed; inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}
.modal.show{display:flex}
.sheet{
  width:90%; max-width:420px;
  background:var(--panel);
  border-radius:20px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  padding:18px;
}
.sheet h2{margin-top:0}

/* =========================
   SELECT
========================= */
select{
  width:100%;
  padding:12px;
  border-radius:12px;
  background:#000;
  color:var(--text);
  border:1px solid var(--line);
}
</style>
</head>

<body>

<header>
  <h1>CALIDAD <span>STREET</span></h1>
</header>

<div id="grid"></div>

<div id="bar">
  <div>
    <div><b id="count">0</b> articles</div>
    <div>Total : <b><span id="total">0</span> €</b></div>
  </div>
  <button class="btn primary" onclick="checkout()">COMMANDER</button>
</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="productModal">
  <div class="sheet">
    <h2 id="pName"></h2>
    <p id="pDesc" style="color:var(--muted)"></p>

    <label>Poids / Prix</label>
    <select id="variantSelect"></select>

    <label style="margin-top:10px">Quantité</label>
    <select id="qtySelect">
      <option>1</option><option>2</option><option>3</option>
    </select>

    <p style="margin-top:10px">
      Sous‑total : <b><span id="sub">0</span> €</b>
    </p>

    <button class="btn primary" style="width:100%" onclick="addToCart()">Ajouter</button>
  </div>
</div>

<script>
/* =========================
   DATA (MODIFIABLE ADMIN)
========================= */
const PRODUCTS = [
  {
    id:"mousseux",
    name:"Mousseux Premium",
    desc:"Texture aérienne, odeur propre, rendement constant.",
    badge:"TOP",
    variants:[
      {label:"1g", price:10},
      {label:"3g", price:25},
      {label:"5g", price:30},
      {label:"10g", price:55}
    ]
  },
  {
    id:"frozen",
    name:"Frozen",
    desc:"Extraction clean, saveur glacée, haute qualité.",
    badge:"NEON",
    variants:[
      {label:"1g", price:12},
      {label:"5g", price:45},
      {label:"10g", price:80}
    ]
  }
];

let CART = [];

/* =========================
   RENDER
========================= */
const grid = document.getElementById("grid");

PRODUCTS.forEach(p=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`
    <span class="badge">${p.badge}</span>
    <h3>${p.name}</h3>
    <p>${p.desc}</p>
  `;
  div.onclick=()=>openProduct(p);
  grid.appendChild(div);
});

/* =========================
   PRODUCT MODAL
========================= */
let CURRENT=null;
function openProduct(p){
  CURRENT=p;
  document.getElementById("pName").textContent=p.name;
  document.getElementById("pDesc").textContent=p.desc;
  const sel=document.getElementById("variantSelect");
  sel.innerHTML=p.variants.map((v,i)=>`<option value="${i}">${v.label} — ${v.price}€</option>`).join("");
  updateSub();
  sel.onchange=updateSub;
  document.getElementById("qtySelect").onchange=updateSub;
  document.getElementById("productModal").classList.add("show");
}
function updateSub(){
  const v=CURRENT.variants[variantSelect.value];
  const q=qtySelect.value;
  document.getElementById("sub").textContent=v.price*q;
}
function addToCart(){
  const v=CURRENT.variants[variantSelect.value];
  const q=Number(qtySelect.value);
  CART.push({name:CURRENT.name,variant:v.label,price:v.price,qty:q});
  document.getElementById("productModal").classList.remove("show");
  renderBar();
}

/* =========================
   BAR / CHECKOUT
========================= */
function renderBar(){
  document.getElementById("count").textContent=CART.reduce((s,i)=>s+i.qty,0);
  document.getElementById("total").textContent=CART.reduce((s,i)=>s+i.price*i.qty,0);
}

function checkout(){
  if(CART.length===0) return;
  const msg=CART.map(i=>`${i.name} ${i.variant} x${i.qty} = ${i.price*i.qty}€`).join("\n");
  const total=CART.reduce((s,i)=>s+i.price*i.qty,0);
  const final=`🛒 COMMANDE\n\n${msg}\n\nTOTAL: ${total}€`;

  if(window.Telegram?.WebApp){
    Telegram.WebApp.sendData(JSON.stringify({order:CART,total}));
    Telegram.WebApp.close();
  }else{
    navigator.clipboard.writeText(final);
    alert("Commande copiée");
  }
}
</script>

</body>
</html>
